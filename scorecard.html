<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — scorecard (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-1:hsl(240 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);--bg-warning:hsl(38 90% 96%);--border-warning:hsl(38 80% 85%);
    --radius:10px;--shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums}
  .cf-sq{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left;width:100%;font:inherit;color:inherit;box-shadow:var(--shadow)}
  .cf-sq:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .cf-sq:disabled{cursor:default;opacity:.75;box-shadow:none;transform:none}
  .cf-sq.est{border-style:dashed;border-color:var(--border-strong)}
  .cf-amt{font-weight:700;letter-spacing:-.01em}
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-btn.sm{padding:5px 11px;font-size:13px}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .cf-pill[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.est{border-style:dashed;border-color:var(--border-strong)}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button:hover{border-color:var(--text-muted)}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .measured{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:99px;padding:3px 9px}
  .esttag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-warning)}
  .fid-banner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:10px;padding:9px 12px;margin-bottom:14px}
  .disc{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
  .disc-toggle{background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;padding:2px 0}
  .disc-body{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .disc-msg{max-width:85%;background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
  .disc-msg.me{align-self:flex-end;background:hsl(240 60% 97%);border-color:hsl(240 40% 90%)}
  .disc-name{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
  .disc-text{font-size:13px}
  .disc-att{margin-top:6px;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:4px 8px}
  .disc-reply{display:flex;gap:6px;margin-top:2px}
  .disc-reply input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:var(--surface-1)}
  .cf-fade{animation:cfOut .35s forwards}
  @keyframes cfOut{to{opacity:0;transform:scale(.96);height:0;margin:0;padding:0;border-width:0}}
  .sav-legend{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:12px;color:var(--text-secondary);margin-top:8px}
  .sav-legend span{display:inline-flex;align-items:center;gap:5px}
  .sav-legend i.k{width:16px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}
  .mtoggle{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:2px}
  .mtoggle button{border:none;background:none;border-radius:99px;padding:4px 12px;cursor:pointer;font:inherit;font-size:12px;font-weight:600;color:var(--text-secondary)}
  .mtoggle button[aria-pressed="true"]{background:var(--surface-2);color:var(--text-primary);box-shadow:var(--shadow)}
  .approved-strip{display:flex;align-items:center;gap:8px;background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:12px;padding:11px 14px;margin-top:2px;font-size:14px;color:var(--text-success)}
  .approved-strip b{font-weight:700}

  /* ---- Scorecard shell: a report card of portfolio standing ---- */
  /* Grade chip — a letter grade for the whole portfolio */
  .sc-report{background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
  .sc-report-top{display:flex;align-items:center;gap:16px}
  .grade{width:66px;height:66px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;letter-spacing:-.02em;flex-shrink:0;line-height:1}
  .grade.g-a{background:var(--bg-success);color:var(--text-success);border:1px solid hsl(86 40% 78%)}
  .grade.g-b{background:hsl(200 60% 96%);color:hsl(205 70% 34%);border:1px solid hsl(205 55% 82%)}
  .grade.g-c{background:var(--bg-warning);color:var(--text-warning);border:1px solid var(--border-warning)}
  .grade sup{font-size:.42em;font-weight:700;margin-left:1px;top:-.5em}
  .sc-report-hd{flex:1;min-width:0}
  .sc-report-hd h1{font-size:20px}
  .sc-report-hd .sub{font-size:14px;color:var(--text-secondary);margin-top:3px}
  .sc-report-hd .sub b{color:var(--text-primary);font-weight:600}
  .sc-report-body{margin-top:16px;padding-top:15px;border-top:1px solid var(--border)}
  /* saved-to-date, prominent inside the report card */
  .sc-saved{display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:none;border:none;padding:0}
  .sc-saved-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
  .sc-saved-v{font-weight:700;color:var(--text-success);letter-spacing:-.01em;font-size:22px}
  .sc-saved-k{font-size:13px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:4px}
  .sc-saved:hover .sc-saved-k{color:var(--text-primary)}
  /* three headline standings under saved-to-date */
  .sc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .sc-metric{background:hsl(240 20% 98%);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
  .sc-metric .k{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .sc-metric .v{font-size:19px;font-weight:700;letter-spacing:-.01em;margin-top:3px;font-variant-numeric:tabular-nums}
  .sc-metric .n{font-size:11px;color:var(--text-muted);margin-top:1px}
  @media (max-width:520px){.sc-metrics{grid-template-columns:1fr;gap:8px}.sc-metric{display:flex;align-items:baseline;justify-content:space-between;gap:10px}.sc-metric .v{margin-top:0}.sc-metric .n{display:none}}

  /* section heading */
  .sc-sec{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:20px 2px 10px}
  /* per-property graded rows */
  .sc-prop{display:flex;align-items:center;gap:14px;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s,border-color .12s;margin-bottom:10px}
  .sc-prop:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .sc-pgrade{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;flex-shrink:0;line-height:1}
  .sc-pgrade.g-a{background:var(--bg-success);color:var(--text-success)}
  .sc-pgrade.g-b{background:hsl(200 60% 96%);color:hsl(205 70% 34%)}
  .sc-pgrade.g-c{background:var(--bg-warning);color:var(--text-warning)}
  .sc-pgrade sup{font-size:.5em;font-weight:700;top:-.55em}
  .sc-prop-main{flex:1;min-width:0}
  .sc-prop-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sc-prop-status{font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .sc-prop-status.ok{color:var(--text-success)}
  .sc-prop-status.high{color:var(--text-warning)}
  .sc-prop-line{font-size:13px;color:var(--text-secondary);margin-top:3px}
  .sc-prop-line b{color:var(--text-success);font-weight:600}
  .sc-bar{position:relative;height:5px;border-radius:3px;background:hsl(240 16% 92%);margin-top:9px;overflow:hidden}
  .sc-bar > i{position:absolute;top:0;bottom:0;left:0;border-radius:3px;background:var(--text-success)}
  .sc-bar.high > i{background:var(--text-warning)}
  .sc-bar > u{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text-muted);opacity:.5}
  .sc-prop-right{flex-shrink:0;text-align:right}
  .sc-prop-saved{font-size:17px;font-weight:700;color:var(--text-success);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
  .sc-prop-savedk{font-size:11px;color:var(--text-muted)}
  .sc-prop-chev{color:var(--text-muted);flex-shrink:0}
  @media (max-width:520px){.sc-prop-chev{display:none}}

  /* standing rows (certification, benchmark) */
  .sc-standrow{display:flex;align-items:flex-start;gap:13px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow);margin-bottom:10px}
  .sc-standrow i.lead{font-size:20px;flex-shrink:0;margin-top:1px}
  .sc-standrow .m{flex:1;min-width:0}
  .sc-standrow .m .t{font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sc-standrow .m .d{font-size:13px;color:var(--text-secondary);margin-top:3px}
  .sc-tag{font-size:12px;font-weight:600;border-radius:99px;padding:3px 9px;white-space:nowrap}
  .sc-tag.ok{color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%)}
  .sc-tag.near{color:hsl(205 70% 34%);background:hsl(200 60% 96%);border:1px solid hsl(205 55% 82%)}

  /* the approve row — reachable, not the hero */
  .sc-act{display:flex;align-items:center;gap:13px;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s,border-color .12s;margin-bottom:10px}
  .sc-act:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .sc-act i.lead{font-size:20px;color:var(--primary);flex-shrink:0}
  .sc-act .m{flex:1;min-width:0}
  .sc-act .m .t{font-weight:600}
  .sc-act .m .d{font-size:13px;color:var(--text-secondary);margin-top:2px}
  .sc-act .m .d b{color:var(--text-success);font-weight:600}
  .sc-act-cta{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;color:var(--primary)}
  .sc-signup{background:linear-gradient(180deg,hsl(86 45% 97.5%),var(--surface-2) 62%);border-color:hsl(86 45% 80%)}
  .sc-signup i.lead{color:var(--text-success)}
  .sc-signup .sc-act-cta{color:var(--text-success)}
  .sc-done{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow);margin-bottom:10px;color:var(--text-secondary);font-size:14px}
  .sc-done i{font-size:19px;color:var(--text-success)}
</style>
</head>

<script>
(function(){
  var app=document.getElementById('app');
  var DATA={
    portfolio:"Coastline Hospitality Group",
    prospects:[
      {id:'p1',name:'Summit Ridge Suites',cf:55000,ready:true,step:'Proposal ready'},
      {id:'p2',name:'Harbor Point Hotel',cf:48000,ready:true,step:'Proposal ready'},

    solutions:[
      {id:'s1',prop:'Marina Bay Inn',type:'Solar + Batteries',u:2,note:'Start now — about a year to build for the 2027 rebate',vendor:'GreenVolt Partners',install:'about 6 weeks · starts Sep',fidelity:'measured',market:150000,discountPct:12,incentive:45000,savings:26000,loan:{termYears:25,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
      {id:'s5',prop:'Cedar Court Hotel',type:'Solar + Batteries',u:2,note:'Start now — about a year to build for the 2027 rebate',vendor:'GreenVolt Partners',install:'about 5 weeks',fidelity:'measured',market:105000,discountPct:12,incentive:31000,savings:18000,loan:{termYears:25,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
      {id:'s2',prop:'Marina Bay Inn',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'measured',market:25000,discountPct:12,incentive:40000,savings:6000,loan:{termYears:5,aprPct:6.9},lease:null},
      {id:'s6',prop:'Cedar Court Hotel',type:'LED Lighting',u:0,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',market:16000,discountPct:13,incentive:2000,savings:4800,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s3',prop:'Marina Bay Inn',type:'LED Lighting',u:0,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',market:12000,discountPct:13,incentive:1400,savings:3600,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s4',prop:'Marina Bay Inn',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'about 1 week',fidelity:'measured',market:28800,discountPct:14,incentive:4000,savings:12800,loan:{termYears:5,aprPct:7.9},lease:null},

      {id:'s11',prop:'Cedar Court Hotel',type:'Kitchen Hood Controls',u:1,vendor:'AirWise Controls',install:'about 1 week',fidelity:'measured',market:10000,discountPct:12,incentive:1000,savings:3200,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s12',prop:'Cedar Court Hotel',type:'Pool Heat Pump',u:1,vendor:'ThermaPool',install:'about 2 weeks',fidelity:'measured',market:13500,discountPct:12,incentive:1800,savings:3900,loan:{termYears:5,aprPct:6.9},lease:null},
      {id:'s13',prop:'Riverside Lodge',type:'Low-Flow Water Fixtures',u:0,vendor:'AquaTrim',install:'about 1 week',fidelity:'measured',market:5000,discountPct:13,incentive:700,savings:2300,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s8',prop:'Riverside Lodge',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'estimated',dataNeed:'your water-heater metering',savings:4200},
      {id:'s9',prop:'Riverside Lodge',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'about 1 week',fidelity:'estimated',dataNeed:'occupancy data',savings:35200},
      {id:'s7',prop:'Cedar Court Hotel',type:'Ozone Laundry',u:0,vendor:'PureWash',install:'about 1 week',fidelity:'measured',market:8500,discountPct:12,incentive:900,savings:3600,loan:{termYears:5,aprPct:7.9},lease:null}
    ],
    // properties Atrium already operates — these have savings history + a forecast
    contracted:[
      {id:'c1',name:'Marina Bay Inn',rooms:120,saved:90000,runPct:96,next12:392000,without12:434000,perRoomNight:12.10},
      {id:'c2',name:'Cedar Court Hotel',rooms:150,saved:78000,runPct:94,next12:471000,without12:516000,perRoomNight:11.40},
      {id:'c3',name:'Riverside Lodge',rooms:96,saved:52000,runPct:108,next12:318000,without12:350000,perRoomNight:13.60}
    ],
    savedByType:[
      {type:'Solar + Batteries',saved:105000,pace:58000},
      {type:'LED Lighting',saved:48000,pace:27000},
      {type:'Heat Pump Water Heaters',saved:40000,pace:20000},
      {type:'Smart Thermostats',saved:27000,pace:14000}
    ]
  };
  var S={screen:'home',bucket:2,solView:'type',group:null,leafId:null,savView:'property',savLeaf:null,period:'annual',signed:{},approved:{},approvedMode:{},mode:{},disc:{},unlocked:0};
  var UL=['Now','Soon','Later'];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function fmtRange(lo,hi){return fmtK(lo)+'–'+fmtK(hi);}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function est(s){return s.fidelity==='estimated';}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function savLo(s){return Math.round(s.savings*0.75/1000)*1000;}
  function savHi(s){return Math.round(s.savings*1.25/1000)*1000;}
  function tileVal(s){return est(s)?5*s.savings:fiveCash(s);}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var d=s.loan?'loan':(s.lease?'lease':'cash');var m=S.mode[s.id]||d;return ms.indexOf(m)>=0?m:d;}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function amtUnit(annual){ return S.period==='monthly' ? {a:fmtK(annual/12),u:'a month'} : {a:fmtK(annual),u:'a year'}; }

  function prospects(){return DATA.prospects.filter(function(p){return !S.signed[p.id];});}

  // Atrium-recommended priority: incentive deadlines first, then quick wins (fast payback / low friction), then value.
  // Rationale: land early wins so customers feel good about Atrium while larger cash flow keeps unlocking over the contract.
  function atriumScore(s){
    // Quick wins lead (fast payback = earliest banked win). Deadline projects (e.g. solar's 2027 clock)
    // get a modest bump so the clock starts, but a true quick win still goes first.
    var pay=est(s)?8:payback(s);

  function recSort(a,b){ return atriumScore(a)-atriumScore(b); }
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){
      return {hero:'+'+per(sav), sub:'One-time '+fmt(nt)+' upfront, then it’s yours',
        chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs',
        takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};
    }
    if(mode==='loan'){
      var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;
      return {hero:'+'+per(sav), sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'% · '+per(ann)+', then it’s yours',
        chips:[['Loan payment',per(ann)],['Term',t+' yrs']],
        series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from day one',
        takeaway:''};
    }
    var la=s.lease.annualAtrium,t2=s.lease.termYears;
    return {hero:'+'+per(sav), sub:'$0 down · '+t2+'-yr lease · '+per(la)+' · no ownership or upkeep',
      chips:[['Lease cost',per(la)],['Term',t2+' yrs']],
      series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from year one',
      takeaway:''};
  }
  function spark(series,be){
    var w=300,h=72,padX=8,padT=8,padB=8,N=120;
    function stepAt(yr){var i=Math.max(0,Math.min(series.length-2,Math.floor(yr)));return series[i+1]-series[i];}
    var cum=series[0],pts=[[0,cum]];
    for(var m=1;m<=N;m++){var yr=m/12;var mult=1+0.1*Math.sin((m-1)/12*2*Math.PI-Math.PI/2);cum+=stepAt(yr-1e-9)/12*mult;pts.push([yr,cum]);}
    var vals=pts.map(function(p){return p[1];}).concat([0]);
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;
    function X(yr){return padX+(yr/10)*(w-2*padX);}
    function Y(v){return padT+(1-(v-mn)/sp)*(h-padT-padB);}
    var line=pts.map(function(p){return X(p[0]).toFixed(1)+','+Y(p[1]).toFixed(1);}).join(' ');
    var area=pts.map(function(p){return X(p[0]).toFixed(1)+','+Y(Math.max(0,p[1])).toFixed(1);}).join(' ')+' '+X(10).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 95%)"/>'
      +'<line x1="'+padX+'" x2="'+(w-padX)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+line+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/></svg>';
  }

        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span style="color:var(--text-secondary);font-weight:600">'+fmtK(e.series[e.series.length-1])+' over 10 yrs</span></div></div>'

  function backPill(){return '<button class="cf-pill" data-act="back" style="display:inline-flex;align-items:center;gap:4px"><i class="ti ti-arrow-left"></i> Back</button>';}
  function perToggle(){return '<div class="seg"><button data-period="annual" aria-pressed="'+(S.period==='annual')+'">Annual</button><button data-period="monthly" aria-pressed="'+(S.period==='monthly')+'">Monthly</button></div>';}

  /* ---------- Scorecard grading ---------- */
  // runPct = actual energy+water cost as a % of what ABE's model expects for this
  // building's occupancy and weather. UNDER 100 = running better than the model
  // predicts (good); OVER 100 = running high (worth a look). "Efficiency margin"
  // is how far under expected you are: 100 - runPct (positive = ahead).
  function effMargin(c){return 100-c.runPct;}                 // +4 means 4% under expected
  function savRatePct(c){return Math.round((c.without12-c.next12)/c.without12*100);} // % below a no-Atrium year
  function gradeFor(margin){                                   // letter grade from the efficiency margin
    if(margin>=6)return {g:'A',s:'+',cls:'g-a'};
    if(margin>=3)return {g:'A',s:'',cls:'g-a'};
    if(margin>=1)return {g:'B',s:'+',cls:'g-b'};
    if(margin>=-1)return {g:'B',s:'',cls:'g-b'};
    if(margin>=-4)return {g:'B',s:'-',cls:'g-b'};
    return {g:'C',s:'+',cls:'g-c'};
  }
  function portfolioMargin(){ // room-weighted efficiency margin across operating hotels
    var wsum=0,w=0;DATA.contracted.forEach(function(c){wsum+=effMargin(c)*c.rooms;w+=c.rooms;});
    return w?wsum/w:0;
  }
  function gradeChip(gd,big){
    return '<span class="'+(big?'grade':'sc-pgrade')+' '+gd.cls+'">'+gd.g+(gd.s?'<sup>'+gd.s+'</sup>':'')+'</span>';
  }

  /* ---------- Scorecard home: a report card of portfolio standing ---------- */
  function savedHeroSvg(toDate,perYear,stroke,areaFill){
    var paceCash=DATA.savedByType.reduce(function(t,x){return t+x.pace;},0);
    var without=DATA.contracted.reduce(function(t,c){return t+c.without12;},0);
    var ratio=(0.30*without)/(paceCash||1);                            // approve-all is this multiple of the current rate
    var saved=toDate!=null?toDate:DATA.contracted.reduce(function(t,c){return t+c.saved;},0);
    var pace=perYear!=null?perYear:paceCash;
    var fullPace=pace*ratio;
    stroke=stroke||'var(--text-success)'; areaFill=areaFill||'hsl(86 45% 93%)';
    var w=300,h=96,padX=1,padT=7,padB=5,past=24,fut=24,n=past+fut;
    // seasonality: "now" = summer. Summer = big peak (HVAC + occupancy + rates all high); winter = smaller peak
    // (heating high, occupancy lower); spring & fall = troughs. cos(annual) makes summer>winter; cos(semi-annual) makes the two peaks.
    function seas(m){var k=(m-past)/12;return 1+0.22*Math.cos(2*Math.PI*k)+0.34*Math.cos(4*Math.PI*k);}
    // PAST: annual savings rate grows 5%/yr (counterfactual inflation) -> cumulative accelerates; scaled to hit `saved` at today
    var raw=[0],rc=0;
    for(var m=1;m<=past;m++){var yr=(m-past)/12;rc+=(pace/12)*Math.pow(1.05,yr)*seas(m);raw.push(rc);}
    var scale=saved/(raw[past]||1),sol=raw.map(function(v){return v*scale;});
    // FORECASTS from today: current pace, and approve-all (rate ramps to fullPace as now/soon/later deploy), both compounding 5%/yr
    var cur=[saved],full=[saved],cc=saved,fc=saved;
    for(var m=1;m<=fut;m++){
      var yr=m/12;
      cc+=(pace/12)*Math.pow(1.05,yr)*seas(past+m);cur.push(cc);
      var r=pace+(fullPace-pace)*Math.min(1,m/12);
      fc+=(r/12)*Math.pow(1.05,yr)*seas(past+m);full.push(fc);
    }
    var mx=fc*1.04;
    function X(m){return padX+m/n*(w-2*padX);}
    function Y(v){return padT+(1-v/mx)*(h-padT-padB);}
    var solP=[],curP=[],fullP=[];
    for(var i=0;i<=past;i++)solP.push(X(i).toFixed(1)+','+Y(sol[i]).toFixed(1));
    for(var i=0;i<=fut;i++){curP.push(X(past+i).toFixed(1)+','+Y(cur[i]).toFixed(1));fullP.push(X(past+i).toFixed(1)+','+Y(full[i]).toFixed(1));}
    var greenArea=solP.join(' ')+' '+curP.join(' ')+' '+X(n).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    var wedge=fullP.join(' ')+' '+curP.slice().reverse().join(' ');
    var tX=X(past).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+greenArea+'" fill="'+areaFill+'"/>'
      +'<polygon points="'+wedge+'" fill="hsl(240 55% 93%)" opacity="0.8"/>'
      +'<line x1="'+tX+'" x2="'+tX+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="2 3"/>'
      +'<polyline points="'+solP.join(' ')+'" fill="none" stroke="'+stroke+'" stroke-width="2.6"/>'
      +'<polyline points="'+curP.join(' ')+'" fill="none" stroke="'+stroke+'" stroke-width="2.1" stroke-dasharray="1 3.5" stroke-linecap="round" opacity="0.8"/>'
      +'<polyline points="'+fullP.join(' ')+'" fill="none" stroke="var(--primary)" stroke-width="2.4" stroke-dasharray="1 3.5" stroke-linecap="round"/></svg>';
  }
  function propRow(c){

          +'<div class="sc-metric"><div class="k">Hotels saving</div><div class="v">'+DATA.contracted.length+' of '+DATA.contracted.length+'</div><div class="n">every one earning back</div></div>'

      +'<div class="sc-standrow"><i class="ti ti-certificate lead" style="color:var(--text-success)"></i>'
        +'<div class="m"><div class="t">Green certification <span class="sc-tag near">1 step away</span></div>'
          +'<div class="d">2 of 3 hotels meet the efficiency threshold for ENERGY STAR recognition. Approving the proposed work at Riverside Lodge would qualify the third.</div></div></div>';

    // ---- the ACTION is a reachable row, not the hero ----
    var actions='';
    if(live.length){
      var appA=amtUnit(sumSav(live));
      actions+='<button class="sc-act" data-act="go" data-val="solutions"><i class="ti ti-clipboard-check lead"></i>'

        +'<span class="sc-act-cta">Review &amp; approve <i class="ti ti-arrow-right"></i></span></button>';

      var idleA=amtUnit(sumCf(prospects()));
      actions+='<button class="sc-act sc-signup" data-act="go" data-val="signup"><i class="ti ti-building-community lead"></i>'
        +'<div class="m"><div class="t">Put your '+otherW+' on the scorecard</div>'
        +'<div class="d">'+prospectN+' more hotels ready to start — estimated <b>'+idleA.a+' '+idleA.u+'</b> once saving with Atrium</div></div>'
        +'<span class="sc-act-cta">Add properties <i class="ti ti-arrow-right"></i></span></button>';

  function trajChart(sc,apprAnn){
    var wom=sc.without12/12, savFrac=(sc.without12-sc.next12)/sc.without12, apprFrac=Math.max(savFrac,0.30);
    var n=25,w=340,h=120,padX=6,padT=10,padB=8,today=12,infl=0.08,s=[]; // infl = counterfactual energy-cost inflation; with-Atrium stays near-flat, so the gap fans open over time
    function noise(i){return 0.055*Math.sin(i*0.9+0.5)+0.03*Math.sin(i*2.15+1.7)+0.018*Math.sin(i*4.3+3.1);}
    for(var i=0;i<n;i++){
      var yr=(i-today)/12, infF=1+infl*yr;
      var without=wom*infF*(1+noise(i));                                  // counterfactual rises with inflation
      var g=Math.min(1,i/today);                                          // savings ramp in over the past year
      // with-Atrium is always a fraction BELOW the counterfactual (never above); the fraction widens ahead as the counterfactual inflates
      var savNow=savFrac+Math.max(0,0.88*infl*yr), apprNow=apprFrac+Math.max(0,0.88*infl*yr);
      var wth=without*(1-savNow*g);
      var target=without*(1-apprNow);
      var appr=i<=today?wth:wth+(target-wth)*Math.min(1,(i-today)/8);     // "if you approve all" pulls further down after today
      s.push({without:without,wth:wth,appr:appr});
    }
    var all=[];s.forEach(function(d){all.push(d.without,d.wth);if(apprAnn)all.push(d.appr);});
    var mn=0,mx=Math.max.apply(null,all)*1.06,sp=mx-mn;
    function X(i){return padX+i/(n-1)*(w-2*padX);}
    function Y(v){return padT+(1-(v-mn)/sp)*(h-padT-padB);}
    function poly(key,from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i][key]).toFixed(1));return p.join(' ');}
    var gap=[];for(var i=0;i<n;i++)gap.push(X(i).toFixed(1)+','+Y(s[i].without).toFixed(1));for(var j=n-1;j>=0;j--)gap.push(X(j).toFixed(1)+','+Y(s[j].wth).toFixed(1));
    var uw=[];for(var i=today;i<n;i++)uw.push(X(i).toFixed(1)+','+Y(s[i].wth).toFixed(1));for(var j=n-1;j>=today;j--)uw.push(X(j).toFixed(1)+','+Y(s[j].appr).toFixed(1));
    var ylab='position:absolute;left:2px;font-size:10px;color:var(--text-muted);background:rgba(255,255,255,.72);padding:0 3px;border-radius:3px;line-height:1.2;pointer-events:none';
    return '<div style="position:relative">'
      +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+gap.join(' ')+'" fill="hsl(86 45% 91%)"/>'
      +(apprAnn?'<polygon points="'+uw.join(' ')+'" fill="hsl(240 55% 93%)" opacity="0.8"/>':'')
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+poly('without',0,today)+'" fill="none" stroke="var(--text-warning)" stroke-width="2"/>'
      +'<polyline points="'+poly('without',today,n-1)+'" fill="none" stroke="var(--text-warning)" stroke-width="2" stroke-dasharray="5 3"/>'
      +'<polyline points="'+poly('wth',0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly('wth',today,n-1)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="5 3"/>'
      +(apprAnn?'<polyline points="'+poly('appr',today,n-1)+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="2 3"/>':'')
      +'</svg>'
      +'<span style="'+ylab+';top:2px">'+fmtK(mx*12)+'</span>'
      +'<span style="'+ylab+';top:50%;transform:translateY(-50%)">'+fmtK(mx*12/2)+'</span>'
      +'<span style="'+ylab+';bottom:3px">$0</span>'
      +'</div>';
  }
  function cumChart(saved,pace){
    var n=24,w=340,h=118,padX=8,padT=12,padB=8,today=12,s=[],cum=0,pp=saved/12,pf=pace/12;
    for(var i=0;i<=n;i++){s.push(cum);cum+=(i<12?pp:pf);}
    var mx=s[n]||1;
    function X(i){return padX+i/n*(w-2*padX);}
    function Y(v){return padT+(1-v/mx)*(h-padT-padB);}
    function poly(from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i]).toFixed(1));return p.join(' ');}
    var area=poly(0,today)+' '+X(today).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 93%)"/>'
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+poly(0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly(today,n)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="5 3"/></svg>';
  }

    else if(a==='back'){var B={leaf:'group',group:'solutions',solutions:'home',signup:'home',savleaf:'savings',savings:'home'};S.screen=B[S.screen]||'home';render();}
    else if(a==='step'){el.textContent='We’ll guide you →';el.disabled=true;el.style.opacity=.6;}
    else if(a==='sign'){var p=DATA.prospects.find(function(x){return x.id===v;});window.open('esign.html?doc='+encodeURIComponent('New property — '+p.name),'_blank');unlockRow(v,p.cf,function(){S.signed[v]=1;render();});}
  });
  render();
})();
</script>
</body>
</html>
