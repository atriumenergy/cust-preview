<style>
  :root{

    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);--bg-warning:hsl(38 90% 96%);--border-warning:hsl(38 80% 85%);
    --radius:10px;--shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);

    --approve:hsl(152 56% 35%);--approve-fg:#ffffff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .cf-sq{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left;width:100%;font:inherit;color:inherit;box-shadow:var(--shadow)}

  .cf-sq:disabled{cursor:default;opacity:.75;box-shadow:none;transform:none}
  .cf-sq.est{border-style:dashed;border-color:var(--border-strong)}
  .cf-amt{font-weight:700;letter-spacing:-.01em}
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-btn.sm{padding:5px 11px;font-size:13px}

  .cf-btn[data-approve]{display:flex;width:100%;justify-content:center;align-items:center;gap:9px;margin-top:6px;padding:15px 18px;font-size:16px;font-weight:700;border-radius:12px;background:var(--approve);border-color:var(--approve);color:var(--approve-fg);box-shadow:0 6px 18px hsl(152 56% 35% / .30)}
  .cf-btn[data-approve]:hover{filter:brightness(1.06)}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .cf-pill[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.est{border-style:dashed;border-color:var(--border-strong)}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button:hover{border-color:var(--text-muted)}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .act{display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s,border-color .12s;margin-bottom:12px}

  .act-label{font-size:15.5px;font-weight:600;color:var(--text-secondary)}
  .act-amt{font-weight:700;letter-spacing:-.02em;line-height:1.02}
  .act-amt .u{font-size:.42em;font-weight:600;color:var(--text-muted);letter-spacing:0}

  .act-cta{display:inline-flex;align-items:center;gap:6px;margin-top:15px;background:var(--primary);color:var(--primary-fg);border-radius:10px;padding:10px 17px;font-size:14px;font-weight:600}
  .sav-hero{display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:15px 16px 12px;box-shadow:var(--shadow);margin-bottom:16px;transition:box-shadow .12s,border-color .12s}
  .sav-hero:hover{box-shadow:var(--shadow-hover);border-color:var(--border-strong)}

  .sav-hero-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
  .sav-hero-v{font-weight:700;color:var(--text-success);letter-spacing:-.01em;font-size:20px}
  .sav-hero-v b{font-weight:700}
  .sav-hero-k{font-size:13px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:4px}

  .mtoggle{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:2px}

  .disc-msg{max-width:85%;background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
  .disc-msg.me{align-self:flex-end;background:hsl(240 60% 97%);border-color:hsl(240 40% 90%)}

  .bld-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px 6px}
  .bld-name{font-size:16px;font-weight:700}
  .bld-leg{font-size:12px;color:var(--text-muted);display:inline-flex;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
  .dot.pulse{animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .bld-band{display:flex;align-items:stretch;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:none;border:none;border-top:1px solid var(--border)}

  .bld-art{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:23px;border-right:1px solid var(--border)}
  .bld-band.lead .bld-art{color:var(--text-success)}
  .bld-mid{flex:1;min-width:0;padding:11px 12px;display:flex;flex-direction:column;gap:1px;justify-content:center}
  .bld-zone{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
  .bld-sys{font-size:15px;font-weight:700}
  .bld-live{font-size:12px;color:var(--text-secondary);display:inline-flex;align-items:center;margin-top:1px}
  .bld-amt{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:11px 8px 11px 14px;text-align:right}
  .bld-amt .v{font-size:18px;font-weight:700;color:var(--text-success);letter-spacing:-.01em;white-space:nowrap;line-height:1.1}
  .bld-amt .u{font-size:11px;color:var(--text-muted)}
  .bld-amt .rev{font-size:11px;font-weight:600;color:var(--primary);margin-top:3px;white-space:nowrap}
  .bld-chev{display:flex;align-items:center;padding-right:12px;color:var(--text-muted);font-size:18px;flex-shrink:0;transition:transform .12s,color .12s}
  .spine-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:20px 0 10px}
  .spine-title{font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .spine-sub{font-size:13px;color:var(--text-secondary);margin-top:2px}
  .chartcap{font-size:13px;color:var(--text-secondary);margin:0 0 8px}
  .ylab{position:absolute;left:2px;font-size:10px;color:var(--text-muted);background:rgba(255,255,255,.72);padding:0 3px;border-radius:3px;line-height:1.2;pointer-events:none}
  .sys-opp{display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s,border-color .12s;margin-bottom:12px}
  .sys-opp:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .sys-opp.est{border-style:dashed;border-color:var(--border-strong)}
  .metric{display:flex;flex-direction:column;gap:1px}
  .metric .mk{font-size:11px;color:var(--text-muted)}
  .metric .mv{font-size:15px;font-weight:700}
  /* Sign-up-a-new-property is a different decision from approving an upgrade — give it its own navy "expand your portfolio" world, distinct from the green savings flow. */
  .addprop{display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:linear-gradient(180deg,hsl(240 60% 98%),var(--surface-2) 72%);border:1px solid hsl(240 40% 88%);border-left:4px solid var(--primary);border-radius:16px;padding:18px;box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s;margin-top:18px}
  .addprop:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
  .addprop-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;color:var(--primary)}
  .addprop-ic{width:26px;height:26px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
  .addprop-label{font-size:15px;font-weight:700}
  .addprop-amt{font-size:26px;font-weight:700;color:var(--primary);letter-spacing:-.02em;line-height:1.05}
  .addprop-amt .u{font-size:.5em;color:var(--text-muted);font-weight:600}
  .addprop-sub{font-size:14px;color:var(--text-secondary);margin-top:4px}
  .addprop-cta{display:inline-flex;align-items:center;gap:6px;margin-top:13px;background:var(--primary);color:#fff;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600}
  @media(max-width:430px){
    .bld-art{width:44px;font-size:20px}
    .bld-amt{padding:10px 4px 10px 8px}.bld-amt .v{font-size:16px}
    .bld-chev{padding-right:7px}
  }
</style>
</head>

  // Atrium-recommended priority: incentive deadlines first, then quick wins (fast payback / low friction), then value.
  // Rationale: land early wins so customers feel good about Atrium while larger cash flow keeps unlocking over the contract.
  function atriumScore(s){
    // Quick wins lead (fast payback = earliest banked win). Deadline projects (e.g. solar's 2027 clock)
    // get a modest bump so the clock starts, but a true quick win still goes first.
    var pay=est(s)?8:payback(s);

  function recSort(a,b){ return atriumScore(a)-atriumScore(b); }
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){
      return {hero:'+'+per(sav), sub:'One-time '+fmt(nt)+' upfront, then it’s yours',
        chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs',
        takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};
    }
    if(mode==='loan'){
      var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;
      return {hero:'+'+per(sav), sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'% · '+per(ann)+', then it’s yours',
        chips:[['Loan payment',per(ann)],['Term',t+' yrs']],
        series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from day one',
        takeaway:''};
    }
    var la=s.lease.annualAtrium,t2=s.lease.termYears;
    return {hero:'+'+per(sav), sub:'$0 down · '+t2+'-yr lease · '+per(la)+' · no ownership or upkeep',
      chips:[['Lease cost',per(la)],['Term',t2+' yrs']],
      series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from year one',
      takeaway:''};

  function spark(series,be){
    var w=300,h=72,padX=8,padT=8,padB=8,N=120;
    function stepAt(yr){var i=Math.max(0,Math.min(series.length-2,Math.floor(yr)));return series[i+1]-series[i];}
    var cum=series[0],pts=[[0,cum]];
    for(var m=1;m<=N;m++){var yr=m/12;var mult=1+0.1*Math.sin((m-1)/12*2*Math.PI-Math.PI/2);cum+=stepAt(yr-1e-9)/12*mult;pts.push([yr,cum]);}
    var vals=pts.map(function(p){return p[1];}).concat([0]);
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;
    function X(yr){return padX+(yr/10)*(w-2*padX);}
    function Y(v){return padT+(1-(v-mn)/sp)*(h-padT-padB);}
    var line=pts.map(function(p){return X(p[0]).toFixed(1)+','+Y(p[1]).toFixed(1);}).join(' ');
    var area=pts.map(function(p){return X(p[0]).toFixed(1)+','+Y(Math.max(0,p[1])).toFixed(1);}).join(' ')+' '+X(10).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 95%)"/>'
      +'<line x1="'+padX+'" x2="'+(w-padX)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'<polyline points="'+line+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/></svg>';
  }

  function savHeroSvg(toDate,perYear,stroke,areaFill,single){
    var paceCash=DATA.savedByType.reduce(function(t,x){return t+x.pace;},0);
    var without=DATA.contracted.reduce(function(t,c){return t+c.without12;},0);
    var ratio=(0.30*without)/(paceCash||1);                            // approve-all is this multiple of the current rate
    var saved=toDate!=null?toDate:DATA.contracted.reduce(function(t,c){return t+c.saved;},0);
    var pace=perYear!=null?perYear:paceCash;
    var fullPace=pace*ratio;
    stroke=stroke||'var(--text-success)'; areaFill=areaFill||'hsl(86 45% 93%)';
    var w=300,h=96,padX=1,padT=7,padB=5,past=24,fut=24,n=past+fut;
    // seasonality: "now" = summer. Summer = big peak (HVAC + occupancy + rates all high); winter = smaller peak
    // (heating high, occupancy lower); spring & fall = troughs. cos(annual) makes summer>winter; cos(semi-annual) makes the two peaks.
    // Cash (default) routes through the shared per-property series so this home summary matches the drill's aggregate. A metric override (single=true, e.g. CO2 on impact, which has no per-property profile) keeps the single portfolio-level curve below.
    var sol,cur,full;
    if(!single){var SS=savSeries(DATA.contracted);sol=SS.sol;cur=SS.cur;full=SS.full;}
    else{
      var seas=function(m){var k=(m-past)/12;return 1+0.22*Math.cos(2*Math.PI*k)+0.34*Math.cos(4*Math.PI*k);};
      var raw=[0],rc=0;
      for(var m=1;m<=past;m++){var yr=(m-past)/12;rc+=(pace/12)*Math.pow(1.05,yr)*seas(m);raw.push(rc);}
      var scale=saved/(raw[past]||1);sol=raw.map(function(v){return v*scale;});
      cur=[saved];full=[saved];var cc=saved,fc=saved;
      for(var m=1;m<=fut;m++){var yr=m/12;cc+=(pace/12)*Math.pow(1.05,yr)*seas(past+m);cur.push(cc);var r=pace+(fullPace-pace)*Math.min(1,m/12);fc+=(r/12)*Math.pow(1.05,yr)*seas(past+m);full.push(fc);}
    }
    var mx=full[fut]*1.04;
    function X(m){return padX+m/n*(w-2*padX);}
    function Y(v){return padT+(1-v/mx)*(h-padT-padB);}
    var solP=[],curP=[],fullP=[];
    for(var i=0;i<=past;i++)solP.push(X(i).toFixed(1)+','+Y(sol[i]).toFixed(1));
    for(var i=0;i<=fut;i++){curP.push(X(past+i).toFixed(1)+','+Y(cur[i]).toFixed(1));fullP.push(X(past+i).toFixed(1)+','+Y(full[i]).toFixed(1));}
    var greenArea=solP.join(' ')+' '+curP.join(' ')+' '+X(n).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    var wedge=fullP.join(' ')+' '+curP.slice().reverse().join(' ');
    var tX=X(past).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+greenArea+'" fill="'+areaFill+'"/>'
      +'<polygon points="'+wedge+'" fill="hsl(240 55% 93%)" opacity="0.8"/>'
      +'<line x1="'+tX+'" x2="'+tX+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'<polyline points="'+solP.join(' ')+'" fill="none" stroke="'+stroke+'" stroke-width="2.6"/>'
      +'<polyline points="'+curP.join(' ')+'" fill="none" stroke="'+stroke+'" stroke-width="2.1" stroke-dasharray="1 3.5" stroke-linecap="round" opacity="0.8"/>'
      +'<polyline points="'+fullP.join(' ')+'" fill="none" stroke="var(--primary)" stroke-width="2.4" stroke-dasharray="1 3.5" stroke-linecap="round"/></svg>';
  }

  function trajChart(sc,apprAnn){
    var wom=sc.without12/12, savFrac=(sc.without12-sc.next12)/sc.without12, apprFrac=Math.max(savFrac,0.30);
    var n=25,w=340,h=120,padX=6,padT=10,padB=8,today=12,infl=0.08,s=[]; // infl = counterfactual energy-cost inflation; with-Atrium stays near-flat, so the gap fans open over time
    function noise(i){return 0.055*Math.sin(i*0.9+0.5)+0.03*Math.sin(i*2.15+1.7)+0.018*Math.sin(i*4.3+3.1);}
    for(var i=0;i<n;i++){
      var yr=(i-today)/12, infF=1+infl*yr;
      var without=wom*infF*(1+noise(i));                                  // counterfactual rises with inflation
      var g=Math.min(1,i/today);                                          // savings ramp in over the past year
      // with-Atrium is always a fraction BELOW the counterfactual (never above); the fraction widens ahead as the counterfactual inflates
      var savNow=savFrac+Math.max(0,0.88*infl*yr), apprNow=apprFrac+Math.max(0,0.88*infl*yr);
      var wth=without*(1-savNow*g);
      var target=without*(1-apprNow);
      var appr=i<=today?wth:wth+(target-wth)*Math.min(1,(i-today)/8);     // "if you approve all" pulls further down after today
      s.push({without:without,wth:wth,appr:appr});
    }
    var all=[];s.forEach(function(d){all.push(d.without,d.wth);if(apprAnn)all.push(d.appr);});
    var mn=0,mx=Math.max.apply(null,all)*1.06,sp=mx-mn;
    function X(i){return padX+i/(n-1)*(w-2*padX);}
    function Y(v){return padT+(1-(v-mn)/sp)*(h-padT-padB);}
    function poly(key,from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i][key]).toFixed(1));return p.join(' ');}
    var gap=[];for(var i=0;i<n;i++)gap.push(X(i).toFixed(1)+','+Y(s[i].without).toFixed(1));for(var j=n-1;j>=0;j--)gap.push(X(j).toFixed(1)+','+Y(s[j].wth).toFixed(1));
    var uw=[];for(var i=today;i<n;i++)uw.push(X(i).toFixed(1)+','+Y(s[i].wth).toFixed(1));for(var j=n-1;j>=today;j--)uw.push(X(j).toFixed(1)+','+Y(s[j].appr).toFixed(1));
    var ylab='position:absolute;left:2px;font-size:10px;color:var(--text-muted);background:rgba(255,255,255,.72);padding:0 3px;border-radius:3px;line-height:1.2;pointer-events:none';
    return '<div style="position:relative">'
      +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+gap.join(' ')+'" fill="hsl(86 45% 91%)"/>'
      +(apprAnn?'<polygon points="'+uw.join(' ')+'" fill="hsl(240 55% 93%)" opacity="0.8"/>':'')
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'<polyline points="'+poly('without',0,today)+'" fill="none" stroke="var(--text-warning)" stroke-width="2"/>'
      +'<polyline points="'+poly('without',today,n-1)+'" fill="none" stroke="var(--text-warning)" stroke-width="2" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'<polyline points="'+poly('wth',0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly('wth',today,n-1)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +(apprAnn?'<polyline points="'+poly('appr',today,n-1)+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="1 3.5" stroke-linecap="round"/>':'')
      +'</svg>'
      +'<span style="'+ylab+';top:2px">'+fmtK(mx*12)+'</span>'
      +'<span style="'+ylab+';top:50%;transform:translateY(-50%)">'+fmtK(mx*12/2)+'</span>'
      +'<span style="'+ylab+';bottom:3px">$0</span>'
      +'</div>';
  }
  function cumChart(saved,pace){
    var n=24,w=340,h=118,padX=8,padT=12,padB=8,today=12,s=[],cum=0,pp=saved/12,pf=pace/12;
    for(var i=0;i<=n;i++){s.push(cum);cum+=(i<12?pp:pf);}
    var mx=s[n]||1;
    function X(i){return padX+i/n*(w-2*padX);}
    function Y(v){return padT+(1-v/mx)*(h-padT-padB);}
    function poly(from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i]).toFixed(1));return p.join(' ');}
    var area=poly(0,today)+' '+X(today).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 93%)"/>'
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'<polyline points="'+poly(0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly(today,n)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="1 3.5" stroke-linecap="round"/></svg>';
  }
  function savAxis(){return '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>12 mo ago</span><span>today</span><span>12 mo ahead</span></div>';}
  // Per-property cumulative "cash banked" series. Each property carries its own season:{amp,phase,winter}; we sum the per-property curves so a portfolio shows the aggregate blend (peaks partly offset, winter texture from lodges, etc.).
  function savSeries(props){
    var past=24,fut=24,n=past+fut,sol=[],cur=[],full=[];
    for(var i=0;i<=past;i++)sol.push(0);
    for(var i=0;i<=fut;i++){cur.push(0);full.push(0);}
    props.forEach(function(c){
      var pr=c.season||{amp:1,phase:0,winter:0.34},saved=c.saved,pace=c.without12-c.next12,fullPace=0.30*c.without12;
      function seas(m){var k=(m-past)/12-pr.phase/12;return 1+pr.amp*(0.22*Math.cos(2*Math.PI*k)+pr.winter*Math.cos(4*Math.PI*k));}
      var raw=[0],rc=0;
      for(var m=1;m<=past;m++){var yr=(m-past)/12;rc+=(pace/12)*Math.pow(1.05,yr)*seas(m);raw.push(rc);}
      var sc=saved/(raw[past]||1);
      for(var i=0;i<=past;i++)sol[i]+=raw[i]*sc;
      var cc=saved,fc=saved;cur[0]+=saved;full[0]+=saved;
      for(var m=1;m<=fut;m++){var yr=m/12;cc+=(pace/12)*Math.pow(1.05,yr)*seas(past+m);cur[m]+=cc;var r=pace+(fullPace-pace)*Math.min(1,m/12);fc+=(r/12)*Math.pow(1.05,yr)*seas(past+m);full[m]+=fc;}
    });
    return {sol:sol,cur:cur,full:full,past:past,fut:fut,n:n};
  }
  function bankedChart(props){
    if(!props)props=DATA.contracted;
    var SS=savSeries(props),sol=SS.sol,cur=SS.cur,full=SS.full,past=SS.past,fut=SS.fut,n=SS.n;
    var w=340,h=118,padX=6,padT=10,padB=8,fc=full[fut];
    var mx=fc*1.04;
    function X(m){return padX+m/n*(w-2*padX);}
    function Y(v){return padT+(1-v/mx)*(h-padT-padB);}
    var solP=[],curP=[],fullP=[];
    for(var i=0;i<=past;i++)solP.push(X(i).toFixed(1)+','+Y(sol[i]).toFixed(1));
    for(var i=0;i<=fut;i++){curP.push(X(past+i).toFixed(1)+','+Y(cur[i]).toFixed(1));fullP.push(X(past+i).toFixed(1)+','+Y(full[i]).toFixed(1));}
    var greenArea=solP.join(' ')+' '+curP.join(' ')+' '+X(n).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    var wedge=fullP.join(' ')+' '+curP.slice().reverse().join(' ');
    var tX=X(past).toFixed(1);
    var ylab='position:absolute;left:2px;font-size:10px;color:var(--text-muted);background:rgba(255,255,255,.72);padding:0 3px;border-radius:3px;line-height:1.2;pointer-events:none';
    return '<div style="position:relative">'
      +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+greenArea+'" fill="hsl(86 45% 92%)"/>'
      +'<polygon points="'+wedge+'" fill="hsl(240 55% 93%)" opacity="0.8"/>'
      +'<line x1="'+tX+'" x2="'+tX+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'<polyline points="'+solP.join(' ')+'" fill="none" stroke="var(--text-success)" stroke-width="2.6"/>'
      +'<polyline points="'+curP.join(' ')+'" fill="none" stroke="var(--text-success)" stroke-width="2.1" stroke-dasharray="1 3.5" stroke-linecap="round" opacity="0.8"/>'
      +'<polyline points="'+fullP.join(' ')+'" fill="none" stroke="var(--primary)" stroke-width="2.6" stroke-dasharray="1 3.5" stroke-linecap="round"/>'
      +'</svg>'
      +'<span style="'+ylab+';top:2px">'+fmtK(mx)+'</span><span style="'+ylab+';top:50%;transform:translateY(-50%)">'+fmtK(mx/2)+'</span><span style="'+ylab+';bottom:3px">$0</span>'
      +'</div>';
  }

  function renderLeaf(){
    var s=DATA.solutions.find(function(x){return x.id===S.leafId;});
    if(!s||S.approved[s.id]){S.screen='system';return renderSystem();}
    var head='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()+(est(s)?'':'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span>')+'</div>';
    app.innerHTML=head+unlockedBanner()+solutionCard(s);
  }
  function render(){ if(S.screen==='home')renderHome();else if(S.screen==='signup')renderSignup();else if(S.screen==='system')renderSystem();else if(S.screen==='leaf')renderLeaf();else if(S.screen==='savings')renderSavings();else renderHome(); }
  function unlockRow(id,amt,then){var row=app.querySelector('[data-row="'+id+'"]');S.unlocked+=amt;if(row){row.classList.add('cf-fade');setTimeout(then,340);}else then();}
  app.addEventListener('click',function(e){
    var d=e.target.closest('[data-disc]'); if(d){S.disc[d.dataset.disc]=!S.disc[d.dataset.disc];render();return;}
    var pertog=e.target.closest('[data-period]'); if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]'); if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var el=e.target.closest('[data-act],[data-approve]'); if(!el)return;
    if(el.dataset.approve){var s=DATA.solutions.find(function(x){return x.id===el.dataset.approve;});var m=curMode(s);window.open('esign.html?doc='+encodeURIComponent(s.type+' — '+s.prop),'_blank');unlockRow(s.id,fiveCash(s),function(){S.approved[s.id]=1;S.approvedMode[s.id]=m;S.screen='system';render();});return;}
    var a=el.dataset.act, v=el.dataset.val;
    if(a==='connect'){el.textContent='Request sent →';el.disabled=true;el.style.opacity=.7;}
    else if(a==='go'){S.screen=v;render();}
    else if(a==='bld'){S.bld=v;render();}
    else if(a==='system'){S.sysKey=v;S.sysBld=S.bld;S.sysFrom='home';S.screen='system';render();}
    else if(a==='systype'){S.sysKey=v;S.sysBld=null;S.sysFrom='savings';S.screen='system';render();}
    else if(a==='leaf'){S.leafId=v;S.screen='leaf';render();}
    else if(a==='savchart'){S.savChart=v;render();}
    else if(a==='back'){var B={leaf:'system',system:(S.sysFrom||'home'),savings:'home',signup:'home'};S.screen=B[S.screen]||'home';render();}
    else if(a==='step'){el.textContent='We’ll guide you →';el.disabled=true;el.style.opacity=.6;}
    else if(a==='sign'){var p=DATA.prospects.find(function(x){return x.id===v;});window.open('esign.html?doc='+encodeURIComponent('New property — '+p.name),'_blank');unlockRow(v,p.cf,function(){S.signed[v]=1;render();});}
  });
  render();
})();
</script>
</body>
</html>
