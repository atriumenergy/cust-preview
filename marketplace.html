<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — cash-flow (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-1:hsl(240 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);--bg-warning:hsl(38 90% 96%);--border-warning:hsl(38 80% 85%);
    --radius:10px;--shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .cf-sq{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left;width:100%;font:inherit;color:inherit;box-shadow:var(--shadow)}
  .cf-sq:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .cf-sq:disabled{cursor:default;opacity:.75;box-shadow:none;transform:none}
  .cf-sq.est{border-style:dashed;border-color:var(--border-strong)}
  .cf-amt{font-weight:700;letter-spacing:-.01em}
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-btn.sm{padding:5px 11px;font-size:13px}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .cf-pill[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.est{border-style:dashed;border-color:var(--border-strong)}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button:hover{border-color:var(--text-muted)}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .measured{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:99px;padding:3px 9px}
  .esttag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-warning)}
  .fid-banner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:10px;padding:9px 12px;margin-bottom:14px}
  .disc{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
  .disc-toggle{background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;padding:2px 0}
  .disc-body{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .disc-msg{max-width:85%;background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
  .disc-msg.me{align-self:flex-end;background:hsl(240 60% 97%);border-color:hsl(240 40% 90%)}
  .disc-name{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
  .disc-text{font-size:13px}
  .disc-att{margin-top:6px;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:4px 8px}
  .disc-reply{display:flex;gap:6px;margin-top:2px}
  .disc-reply input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:var(--surface-1)}
  .cf-fade{animation:cfOut .35s forwards}
  @keyframes cfOut{to{opacity:0;transform:scale(.96);height:0;margin:0;padding:0;border-width:0}}
  .sav-legend{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:12px;color:var(--text-secondary);margin-top:8px}
  .sav-legend span{display:inline-flex;align-items:center;gap:5px}
  .sav-legend i.k{width:16px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}

  /* ---- Marketplace shell (append-only) ---- */
  .mk-head{margin-bottom:1.25rem}
  .mk-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--primary)}
  .mk-shelf-label{display:flex;align-items:baseline;gap:8px;margin:1.5rem 0 .75rem}
  .mk-shelf-label h2{font-size:15px;font-weight:700;margin:0;letter-spacing:-.01em}
  .mk-shelf-label span{font-size:13px;color:var(--text-muted)}
  .mk-prod{position:relative;display:flex;flex-direction:column;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;transition:transform .12s,box-shadow .12s,border-color .12s}
  .mk-prod:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .mk-prod.est{border-style:dashed;border-color:var(--border-strong)}
  .mk-prod.est:hover{transform:none;box-shadow:var(--shadow)}
  .mk-prod.inplan{border-color:var(--text-success);box-shadow:0 0 0 1px var(--text-success),var(--shadow)}
  .mk-open{appearance:none;-webkit-appearance:none;background:none;border:none;text-align:left;font:inherit;color:inherit;cursor:pointer;padding:16px 16px 12px;display:flex;flex-direction:column;gap:9px;flex:1}
  .mk-open:focus-visible{outline:2px solid var(--primary);outline-offset:-2px}
  .mk-type{font-size:16px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
  .mk-prop{font-size:13px;color:var(--text-muted);margin-top:1px}
  .mk-fig{margin-top:2px}
  .mk-fig-k{font-size:11px;color:var(--text-muted)}
  .mk-fig-v{font-size:26px;font-weight:700;letter-spacing:-.02em;color:var(--text-success);line-height:1.1}
  .mk-sav{font-size:13px;color:var(--text-secondary);margin-top:1px}
  .mk-meta{margin-top:auto;display:flex;flex-wrap:wrap;gap:6px 10px;font-size:12px;color:var(--text-muted);padding-top:4px}
  .mk-meta i{color:var(--text-muted)}
  .mk-detailhint{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;color:var(--text-secondary)}
  .mk-foot{border-top:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px}
  .mk-prod.est .mk-foot{border-top-style:dashed}
  .mk-add{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--surface-2);color:var(--primary);border:1px solid var(--border-strong);border-radius:8px;padding:9px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;transition:background .12s,border-color .12s,color .12s}
  .mk-add:hover{border-color:var(--primary)}
  .mk-add.in{background:var(--bg-success);color:var(--text-success);border-color:hsl(86 40% 82%)}
  .mk-add.in:hover{border-color:var(--text-success)}
  .mk-connect{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:none;color:var(--text-warning);border:1px dashed var(--border-warning);border-radius:8px;padding:9px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .mk-connect:hover{background:var(--bg-warning)}
  .mk-connect:disabled{cursor:default;opacity:.75}
  .mk-tags{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:5px;pointer-events:none}
  .mk-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:99px;padding:3px 9px;white-space:nowrap}
  .mk-badge.deal{color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%)}
  .mk-badge.time{color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning)}
  .mk-badge.win{color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%)}
  .mk-cart{position:sticky;bottom:14px;z-index:5;margin-top:1.5rem;display:flex;align-items:center;gap:14px;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:14px;padding:13px 16px;box-shadow:0 8px 24px rgba(16,18,40,.14)}
  .mk-cart.empty{position:static;border-style:dashed;box-shadow:var(--shadow);color:var(--text-muted)}
  .mk-cart-ico{width:38px;height:38px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;background:hsl(240 60% 96%);color:var(--primary);font-size:20px}
  .mk-cart.empty .mk-cart-ico{background:hsl(240 20% 96%);color:var(--text-muted)}
  .mk-cart-body{min-width:0;flex:1}
  .mk-cart-k{font-size:12px;color:var(--text-muted)}
  .mk-cart-v{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .mk-cart-v b{color:var(--text-success);font-weight:700}
  .mk-cart-cta{flex-shrink:0}

  /* ---- Storefront hero + guiding-hand entries ---- */
  .mk-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:1.15rem}
  .mk-brand{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--primary)}
  /* Orders-style savings link — the quiet #3 entry */
  .mk-orders{display:inline-flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:500;color:var(--text-secondary);padding:6px 2px;border-radius:8px}
  .mk-orders:hover{color:var(--text-primary)}
  .mk-orders b{color:var(--text-success);font-weight:700}
  .mk-orders .ic{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--bg-success);color:var(--text-success);font-size:15px}
  /* Featured hero — the matched/recommended APPROVE bundle (#1) */
  .mk-hero{position:relative;display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:linear-gradient(180deg,hsl(86 45% 97.5%),var(--surface-2) 64%);border:1px solid hsl(86 45% 76%);border-radius:18px;box-shadow:var(--shadow);padding:22px;transition:transform .12s,box-shadow .12s,border-color .12s;overflow:hidden}
  .mk-hero:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
  .mk-hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%);border-radius:99px;padding:4px 11px}
  .mk-hero-label{font-size:15px;font-weight:600;color:var(--text-secondary);margin-top:13px}
  .mk-hero-amt{font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--text-success);font-size:52px;margin-top:3px}
  .mk-hero-amt .u{font-size:.32em;font-weight:600;color:var(--text-muted);letter-spacing:0}
  .mk-hero-sub{font-size:14px;color:var(--text-secondary);margin-top:9px;max-width:46ch}
  .mk-hero-cta{display:inline-flex;align-items:center;gap:7px;margin-top:17px;background:var(--primary);color:var(--primary-fg);border-radius:11px;padding:12px 20px;font-size:15px;font-weight:600}
  .mk-hero-bundle{display:flex;flex-wrap:wrap;gap:6px;margin-top:15px}
  .mk-hero-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:99px;padding:5px 11px}
  .mk-hero-chip b{color:var(--text-success);font-weight:700}
  /* Sign-up strip — #2 */
  .mk-signup{display:flex;align-items:center;gap:14px;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;margin-top:14px;transition:transform .12s,box-shadow .12s,border-color .12s}
  .mk-signup:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .mk-signup-ico{width:42px;height:42px;flex-shrink:0;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--bg-warning);color:var(--text-warning);font-size:21px}
  .mk-signup-body{min-width:0;flex:1}
  .mk-signup-k{font-size:13px;color:var(--text-secondary)}
  .mk-signup-k b{color:var(--text-warning);font-weight:700}
  .mk-signup-v{font-size:15px;font-weight:600;letter-spacing:-.01em;margin-top:1px}
  .mk-signup-cta{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-size:14px;font-weight:600}
  @media (max-width:540px){
    .mk-hero-amt{font-size:42px}
    .mk-hero-cta{width:100%;justify-content:center}
    .mk-signup{flex-wrap:wrap}
    .mk-signup-cta{width:100%;justify-content:center;background:var(--primary);color:var(--primary-fg);border-radius:10px;padding:10px}
    .mk-cart{flex-wrap:wrap}
    .mk-cart-cta,.mk-cart-cta .cf-btn{width:100%}
    .mk-cart-cta .cf-btn{justify-content:center}
  }
</style>
</head>
<body>
<div class="wrap">
<div class="banner"><i class="ti ti-info-circle"></i> Concept preview · sample data — for feedback, not final visual design</div>
<div id="app">Loading…</div>
</div>
<script>
(function(){
  var app=document.getElementById('app');
  var DATA={
    portfolio:"Coastline Hospitality Group",
    prospects:[
      {id:'p1',name:'Summit Ridge Suites',cf:180000,ready:true,step:'Proposal ready'},
      {id:'p2',name:'Harbor Point Hotel',cf:140000,ready:true,step:'Proposal ready'},
      {id:'p3',name:'Grandview Hotel',cf:110000,ready:false,step:'Complete your audit',est:true},
      {id:'p4',name:'Old Town Motel',cf:90000,ready:false,step:'Complete your audit',est:true},
      {id:'p5',name:'Pinewood Inn',cf:70000,ready:false,step:'Add your utility bills',est:true},
      {id:'p6',name:'Bayside Motor Lodge',cf:60000,ready:false,step:'Add your utility bills',est:true}
    ],
    solutions:[
      {id:'s1',prop:'Marina Bay Inn',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'about 6 weeks · starts Sep',fidelity:'measured',market:430000,discountPct:12,incentive:130000,savings:75000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
      {id:'s5',prop:'Cedar Court Hotel',type:'Solar + Batteries',u:0,note:'Rebate ends Aug 31',vendor:'GreenVolt Partners',install:'about 5 weeks',fidelity:'measured',market:300000,discountPct:12,incentive:90000,savings:53000,loan:{termYears:10,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
      {id:'s2',prop:'Marina Bay Inn',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'measured',market:72000,discountPct:12,incentive:15000,savings:17000,loan:{termYears:7,aprPct:6.9},lease:null},
      {id:'s6',prop:'Cedar Court Hotel',type:'LED Lighting',u:1,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',market:46000,discountPct:13,incentive:6000,savings:13500,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s3',prop:'Marina Bay Inn',type:'LED Lighting',u:2,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',market:34000,discountPct:13,incentive:4000,savings:10000,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s4',prop:'Marina Bay Inn',type:'Smart Thermostats',u:2,vendor:'Cozy Controls',install:'about 1 week',fidelity:'measured',market:10000,discountPct:14,incentive:1500,savings:4500,loan:{termYears:3,aprPct:7.9},lease:null},
      {id:'s8',prop:'Riverside Lodge',type:'Heat Pump Water Heaters',u:0,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'estimated',dataNeed:'your water-heater metering',savings:12000},
      {id:'s9',prop:'Riverside Lodge',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'about 1 week',fidelity:'estimated',dataNeed:'occupancy data',savings:12500},
      {id:'s7',prop:'Cedar Court Hotel',type:'Ozone Laundry',u:1,vendor:'PureWash',install:'about 1 week',fidelity:'estimated',dataNeed:'laundry-room metering',savings:10000}
    ],
    // properties Atrium already operates — these have savings history + a forecast
    contracted:[
      {id:'c1',name:'Marina Bay Inn',rooms:120,saved:174000,runPct:96,next12:392000,without12:470000,perRoomNight:12.10},
      {id:'c2',name:'Cedar Court Hotel',rooms:150,saved:146000,runPct:94,next12:471000,without12:560000,perRoomNight:11.40},
      {id:'c3',name:'Riverside Lodge',rooms:96,saved:92000,runPct:108,next12:318000,without12:372000,perRoomNight:13.60}
    ],
    savedByType:[
      {type:'Solar + Batteries',saved:198000,pace:205000},
      {type:'LED Lighting',saved:96000,pace:92000},
      {type:'Heat Pump Water Heaters',saved:71000,pace:66000},
      {type:'Smart Thermostats',saved:47000,pace:44000}
    ]
  };
  var S={screen:'home',bucket:2,solView:'type',group:null,leafId:null,savView:'property',savLeaf:null,period:'annual',signed:{},approved:{},approvedMode:{},mode:{},disc:{},unlocked:0};
  var UL=['Now','Soon','Later'];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function fmtRange(lo,hi){return fmtK(lo)+'–'+fmtK(hi);}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function est(s){return s.fidelity==='estimated';}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function savLo(s){return Math.round(s.savings*0.75/1000)*1000;}
  function savHi(s){return Math.round(s.savings*1.25/1000)*1000;}
  function tileVal(s){return est(s)?5*s.savings:fiveCash(s);}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var m=S.mode[s.id]||'cash';return ms.indexOf(m)>=0?m:'cash';}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function perRange(lo,hi){return S.period==='monthly'?fmt(Math.round(lo/12))+'–'+fmt(Math.round(hi/12))+'/mo':fmtK(lo)+'–'+fmtK(hi)+'/yr';}
  function prospects(){return DATA.prospects.filter(function(p){return !S.signed[p.id];});}
  function sols(){return DATA.solutions.filter(function(s){return !S.approved[s.id];});}
  function sumCf(a){return a.reduce(function(t,x){return t+x.cf;},0);}
  function sumTile(a){return a.reduce(function(t,x){return t+tileVal(x);},0);}
  function sumSav(a){return a.reduce(function(t,x){return t+x.savings;},0);}
  function distinctProps(a){var o={};a.forEach(function(s){o[s.prop]=1;});return Object.keys(o).length;}
  function approveAnnualFor(name){return sols().filter(function(s){return s.prop===name;}).reduce(function(t,s){return t+s.savings;},0);}
  function approveCountFor(name){return sols().filter(function(s){return s.prop===name;}).length;}
  function recSort(a,b){ if(a.u!==b.u)return a.u-b.u; if((!!b.note)!==(!!a.note))return (b.note?1:0)-(a.note?1:0); return tileVal(b)-tileVal(a); }
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){
      return {hero:'+'+per(sav), sub:'One-time '+fmt(nt)+' upfront, then it’s yours',
        chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs',
        takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};
    }
    if(mode==='loan'){
      var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;
      return {hero:'+'+per(sav-ann), sub:'$0 down · '+t+'-yr loan @ '+s.loan.aprPct+'%',
        chips:[['Savings','+'+per(sav)],['Loan payment','−'+per(ann)]],
        series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-(y<=t?ann:0);a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from day one',
        takeaway:'$0 down; you net '+per(sav-ann)+' from day one — best near-term cash flow.'};
    }
    var la=s.lease.annualAtrium,t2=s.lease.termYears;
    return {hero:'+'+per(sav-la), sub:'$0 down · '+t2+'-yr lease',
      chips:[['Savings','+'+per(sav)],['Lease cost','−'+per(la)],['Term',t2+' yrs']],
      series:(function(){var a=[0],cum=0;for(var y=1;y<=10;y++){cum+=sav-la;a.push(cum);}return a;})(), be:0.05, beLabel:'cash-flow positive from year one',
      takeaway:'$0 down; net '+per(sav-la)+' a year, no ownership or upkeep.'};
  }
  function spark(series,be){
    var w=300,h=72,pad=8,vals=series.concat([0]);
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),sp=(mx-mn)||1;
    function X(y){return pad+(y/10)*(w-2*pad);}
    function Y(v){return pad+(1-(v-mn)/sp)*(h-2*pad);}
    var pts=series.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');
    var area=pts+' '+X(10).toFixed(1)+','+Y(mn).toFixed(1)+' '+X(0).toFixed(1)+','+Y(mn).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 95%)"/>'
      +'<line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+Y(0).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+pts+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<circle cx="'+X(be).toFixed(1)+'" cy="'+Y(0).toFixed(1)+'" r="3.5" fill="var(--primary)"/></svg>';
  }
  var THREAD=[
    {name:'Dana · Atrium',text:'Here’s the proposal — happy to walk you through any of the numbers.',me:false,att:'proposal.pdf'},
    {name:'You',text:'Can we phase the battery portion to next year?',me:true}

      +(open?'<div class="disc-body">'+THREAD.map(function(m){return '<div class="disc-msg'+(m.me?' me':'')+'"><div class="disc-name">'+m.name+'</div><div class="disc-text">'+esc(m.text)+'</div>'+(m.att?'<div class="disc-att"><i class="ti ti-paperclip"></i> '+m.att+'</div>':'')+'</div>';}).join('')
        +'<div class="disc-reply"><input placeholder="Write a message…" disabled><button class="cf-pill" disabled>Send</button></div></div>':'')
    +'</div>';

  function cardHead(s){
    return '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px">'
      +'<div><div style="font-size:18px;font-weight:700">'+esc(s.type)+'</div>'

      +'<span style="font-size:12px;font-weight:600;color:var(--primary);background:hsl(240 60% 96%);border:1px solid hsl(240 40% 90%);border-radius:99px;padding:4px 10px;white-space:nowrap"><i class="ti ti-calendar"></i> '+UL[s.u]+'</span></div>';

        +'<span style="color:var(--text-success);font-weight:600">−'+fmt(s.incentive)+' incentive</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i>'
        +'<span style="font-weight:700;color:var(--text-primary)">'+fmt(net(s))+' your net</span></div>'
      +'<div style="font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px">How you’ll pay</div>'
      +'<div class="payseg" style="margin-bottom:16px">'+payseg+'</div>'
      +'<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text-muted)">Net cash flow</div>'
        +'<div class="mono" style="font-size:30px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+e.hero+'</div>'
        +'<div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+e.sub+'</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:12px">'+chips+'</div>'
      +'<div style="background:hsl(240 20% 98.5%);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px">'+spark(e.series,e.be)
        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>Now</span><span>'+e.beLabel+'</span><span>10 yrs</span></div></div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:14px"><i class="ti ti-bulb" style="color:var(--text-warning)"></i> '+e.takeaway+'</div>'

        +'<button class="cf-btn" data-approve="'+s.id+'"><i class="ti ti-check"></i> Approve with '+cap(mode)+'</button>'

      +discussion(s)+'</div>';

  function trajChart(sc,apprAnn){
    var wm=sc.next12/12, wom=sc.without12/12, am=(sc.next12-(apprAnn||0))/12;
    var n=24,w=340,h=132,padX=8,padT=16,padB=8,today=11,s=[];
    for(var i=0;i<n;i++){var seas=Math.sin(i/12*Math.PI*2);s.push({without:wom*(1+0.06*seas),wth:wm*(1+0.06*seas),appr:am*(1+0.06*seas)});}
    var all=[];s.forEach(function(d){all.push(d.without,d.wth);if(apprAnn)all.push(d.appr);});
    var mn=Math.min.apply(null,all),mx=Math.max.apply(null,all),sp=(mx-mn)||1;mn-=sp*0.14;mx+=sp*0.08;sp=mx-mn;
    function X(i){return padX+i/(n-1)*(w-2*padX);}
    function Y(v){return padT+(1-(v-mn)/sp)*(h-padT-padB);}
    function poly(key,from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i][key]).toFixed(1));return p.join(' ');}
    var gap=[];for(var i=0;i<=today;i++)gap.push(X(i).toFixed(1)+','+Y(s[i].without).toFixed(1));for(var j=today;j>=0;j--)gap.push(X(j).toFixed(1)+','+Y(s[j].wth).toFixed(1));
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+gap.join(' ')+'" fill="hsl(86 45% 92%)"/>'
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+poly('without',0,n-1)+'" fill="none" stroke="var(--text-warning)" stroke-width="2" stroke-dasharray="5 3"/>'
      +'<polyline points="'+poly('wth',0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly('wth',today,n-1)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="5 3"/>'
      +(apprAnn?'<polyline points="'+poly('appr',today,n-1)+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="2 3"/>':'')
      +'</svg>';
  }
  function cumChart(saved,pace){
    var n=24,w=340,h=118,padX=8,padT=12,padB=8,today=12,s=[],cum=0,pp=saved/12,pf=pace/12;
    for(var i=0;i<=n;i++){s.push(cum);cum+=(i<12?pp:pf);}
    var mx=s[n]||1;
    function X(i){return padX+i/n*(w-2*padX);}
    function Y(v){return padT+(1-v/mx)*(h-padT-padB);}
    function poly(from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i]).toFixed(1));return p.join(' ');}
    var area=poly(0,today)+' '+X(today).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+area+'" fill="hsl(86 45% 93%)"/>'
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+poly(0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly(today,n)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="5 3"/></svg>';
  }
  function savAxis(){return '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:2px"><span>12 mo ago</span><span>today</span><span>12 mo ahead</span></div>';}
  function renderSavings(){
    var byProp=S.savView==='property';
    var toggle='<div style="display:flex;gap:6px;margin-bottom:1rem"><button class="cf-pill" data-act="savview" data-val="property" aria-pressed="'+byProp+'">By property</button><button class="cf-pill" data-act="savview" data-val="type" aria-pressed="'+(!byProp)+'">By solution type</button></div>';
    var grid;
    if(byProp){
      grid=DATA.contracted.map(function(c){
        var high=c.runPct>100;
        var status=high?'<span style="display:inline-flex;align-items:center;gap:4px;color:var(--text-warning);font-size:13px;font-weight:500"><i class="ti ti-alert-triangle"></i> Running high</span>':'<span style="display:inline-flex;align-items:center;gap:4px;color:var(--text-success);font-size:13px;font-weight:500"><i class="ti ti-circle-check"></i> In line</span>';
        return '<button class="cf-sq" data-act="savleaf" data-val="'+c.id+'" style="display:flex;flex-direction:column;gap:5px;min-height:130px"><span style="font-size:15px;font-weight:600">'+esc(c.name)+'</span><span style="font-size:12px;color:var(--text-muted)">Saved to date</span><span class="cf-amt" style="font-size:24px;color:var(--text-success);margin-top:-3px">'+fmtK(c.saved)+'</span><span style="margin-top:auto;display:flex;justify-content:space-between;align-items:center">'+status+'<i class="ti ti-arrow-right" style="color:var(--text-muted)"></i></span></button>';
      }).join('');
    } else {
      grid=DATA.savedByType.map(function(t){
        return '<button class="cf-sq" data-act="savleaf" data-val="'+esc(t.type)+'" style="display:flex;flex-direction:column;gap:5px;min-height:130px"><span style="font-size:15px;font-weight:600">'+esc(t.type)+'</span><span style="font-size:12px;color:var(--text-muted)">Saved to date</span><span class="cf-amt" style="font-size:24px;color:var(--text-success);margin-top:-3px">'+fmtK(t.saved)+'</span><span style="margin-top:auto;display:flex;justify-content:space-between;align-items:center"><span style="color:var(--text-muted);font-size:13px">on pace for +'+fmtK(t.pace)+'/yr</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i></span></button>';
      }).join('');
    }
    var tot=DATA.contracted.reduce(function(t,c){return t+c.saved;},0);
    app.innerHTML='<div style="margin-bottom:1.1rem">'+backPill()+'<h1 style="margin:14px 0 0;font-size:23px">Savings so far</h1><p style="color:var(--text-secondary);margin:.3rem 0 0">You’ve saved <b style="color:var(--text-success)">'+fmtK(tot)+'</b> with Atrium. Open any '+(byProp?'hotel':'solution type')+' to see where it’s headed.</p></div>'+toggle+'<div class="grid">'+grid+'</div>';
  }
  function renderSavingsLeaf(){
    if(S.savView==='property'){
      var c=DATA.contracted.find(function(x){return x.id===S.savLeaf;});
      if(!c){S.screen='savings';return renderSavings();}
      var apprAnn=approveAnnualFor(c.name),apprN=approveCountFor(c.name),high=c.runPct>100;
      var chips='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:14px 0">'
        +'<div class="chip"><div class="k">Saved to date</div><div class="v mono" style="color:var(--text-success)">'+fmtK(c.saved)+'</div></div>'
        +'<div class="chip"><div class="k">Now vs expected</div><div class="v mono" style="color:'+(high?'var(--text-warning)':'var(--text-success)')+'">'+c.runPct+'%</div></div>'
        +'<div class="chip"><div class="k">Next 12 months</div><div class="v mono">'+fmtK(c.next12)+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">$'+c.perRoomNight.toFixed(2)+' per occupied room-night</div></div></div>';
      var legend='<div class="sav-legend"><span><i class="k" style="border-color:var(--text-warning);border-top-style:dashed"></i> without Atrium</span><span><i class="k" style="border-color:var(--text-success)"></i> with Atrium</span>'+(apprAnn?'<span><i class="k" style="border-color:var(--primary);border-top-style:dashed"></i> if you approve the proposed work</span>':'')+'<span>vertical line = today</span></div>';
      var cta=apprAnn?'<div style="margin-top:16px;background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:12px;padding:14px 16px"><div style="font-size:14px">Approve the '+apprN+' proposed project'+(apprN>1?'s':'')+' at '+esc(c.name)+' to save about <b>'+fmtK(apprAnn)+' a year</b> more.</div><button class="cf-btn" data-act="approvehere" data-val="'+esc(c.name)+'" style="margin-top:10px"><i class="ti ti-check"></i> Review &amp; approve here</button></div>':'';
      app.innerHTML='<div style="margin-bottom:1.1rem">'+backPill()+'<h1 style="margin:14px 0 0;font-size:23px">'+esc(c.name)+'</h1><p style="color:var(--text-secondary);margin:.3rem 0 0">'+(high?'Running a little high for your occupancy and weather — worth a look.':'Running in line with your occupancy and weather.')+'</p></div>'
        +'<div class="card"><div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Energy &amp; water cost — last 12 months and next 12</div>'+trajChart(c,apprAnn)+savAxis()+legend+chips
        +'<div style="font-size:13px;color:var(--text-secondary)">The shaded gap is what you’ve saved versus running these buildings without Atrium.</div>'+cta+'</div>';
    } else {
      var t=DATA.savedByType.find(function(x){return x.type===S.savLeaf;});
      if(!t){S.screen='savings';return renderSavings();}
      var live=sols().filter(function(s){return s.type===t.type;}),aa=sumSav(live),an=live.length;
      var cta2=aa?'<div style="margin-top:16px;background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:12px;padding:14px 16px"><div style="font-size:14px">You have '+an+' more '+esc(t.type)+' project'+(an>1?'s':'')+' proposed — approve to add about <b>'+fmtK(aa)+' a year</b>.</div><button class="cf-btn" data-act="approvetype" data-val="'+esc(t.type)+'" style="margin-top:10px"><i class="ti ti-check"></i> Review &amp; approve</button></div>':'';
      app.innerHTML='<div style="margin-bottom:1.1rem">'+backPill()+'<h1 style="margin:14px 0 0;font-size:23px">'+esc(t.type)+'</h1><p style="color:var(--text-secondary);margin:.3rem 0 0">Cumulative savings across your portfolio.</p></div>'
        +'<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px"><div><div style="font-size:12px;color:var(--text-muted)">Saved to date</div><div class="mono" style="font-size:27px;font-weight:700;color:var(--text-success);letter-spacing:-.02em">'+fmtK(t.saved)+'</div></div><div style="text-align:right"><div style="font-size:12px;color:var(--text-muted)">On pace next year</div><div class="mono" style="font-size:18px;font-weight:700">+'+fmtK(t.pace)+'</div></div></div>'+cumChart(t.saved,t.pace)+savAxis()
        +'<div class="sav-legend"><span><i class="k" style="border-color:var(--text-success)"></i> saved so far</span><span><i class="k" style="border-color:var(--text-success);border-top-style:dashed"></i> forecast</span></div>'+cta2+'</div>';
    }
  }
  function renderLeaf(){
    var s=DATA.solutions.find(function(x){return x.id===S.leafId;});
    if(!s||S.approved[s.id]){S.screen='home';return renderShop();}
    var inplan=!est(s)&&!!S.cart[s.id];
    var addBtn=est(s)?'':'<button class="'+(inplan?'cf-pill':'cf-btn')+'" data-act="add" data-val="'+s.id+'" style="display:inline-flex;align-items:center;gap:6px">'+(inplan?'<i class="ti ti-circle-check"></i> In your plan':'<i class="ti ti-plus"></i> Add to plan')+'</button>';
    var head='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()
      +'<span style="display:flex;align-items:center;gap:8px">'+addBtn+(est(s)?'':'<span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle())+'</span></div>';
    app.innerHTML=head+unlockedBanner()+solutionCard(s)+cartBar();
  }

  function render(){ if(S.screen==='leaf')renderLeaf();else if(S.screen==='signup')renderSignup();else if(S.screen==='savings')renderSavings();else if(S.screen==='savleaf')renderSavingsLeaf();else renderShop(); }
  function unlockRow(id,amt,then){var row=app.querySelector('[data-row="'+id+'"]');S.unlocked+=amt;if(row){row.classList.add('cf-fade');setTimeout(then,340);}else then();}
  app.addEventListener('click',function(e){
    var d=e.target.closest('[data-disc]'); if(d){S.disc[d.dataset.disc]=!S.disc[d.dataset.disc];render();return;}
    var pertog=e.target.closest('[data-period]'); if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]'); if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var el=e.target.closest('[data-act],[data-approve]'); if(!el)return;
    if(el.dataset.approve){var s=DATA.solutions.find(function(x){return x.id===el.dataset.approve;});var m=curMode(s);unlockRow(s.id,fiveCash(s),function(){S.approved[s.id]=1;S.approvedMode[s.id]=m;delete S.cart[s.id];S.screen='home';render();});return;}
    var a=el.dataset.act, v=el.dataset.val;
    if(a==='connect'){el.textContent='Request sent →';el.disabled=true;el.style.opacity=.7;}
    else if(a==='add'){S.cart[v]=!S.cart[v];render();}
    else if(a==='review'){var it=cartItems();if(!it.length)it=sols().filter(function(s){return !est(s);}).sort(recSort);if(it.length){S.leafId=it[0].id;S.screen='leaf';}render();}
    else if(a==='go'){S.screen=v;render();}
    else if(a==='leaf'){S.leafId=v;S.screen='leaf';render();}
    else if(a==='savview'){S.savView=v;render();}
    else if(a==='savleaf'){S.savLeaf=v;S.screen='savleaf';render();}
    else if(a==='approvehere'){var mh=sols().filter(function(s){return s.prop===v;}).sort(recSort)[0];if(mh){S.leafId=mh.id;S.screen='leaf';}else S.screen='home';render();}
    else if(a==='approvetype'){var mt=sols().filter(function(s){return s.type===v;}).sort(recSort)[0];if(mt){S.leafId=mt.id;S.screen='leaf';}else S.screen='home';render();}
    else if(a==='step'){el.textContent='We’ll guide you →';el.disabled=true;el.style.opacity=.6;}
    else if(a==='sign'){var p=DATA.prospects.find(function(x){return x.id===v;});unlockRow(v,p.cf,function(){S.signed[v]=1;render();});}
    else if(a==='back'){var B={leaf:'home',signup:'home',savleaf:'savings',savings:'home'};S.screen=B[S.screen]||'home';render();}
  });
  render();
})();
</script>
</body>
</html>
