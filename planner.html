<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium — cash-flow (concept)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
  :root{
    --surface-0:hsl(240 33% 98%);--surface-1:hsl(240 14% 97%);--surface-2:#ffffff;
    --text-primary:hsl(240 50% 10%);--text-secondary:hsl(240 10% 44%);--text-muted:hsl(240 8% 60%);
    --border:hsl(240 12% 90%);--border-strong:hsl(240 12% 82%);
    --text-success:hsl(86 58% 33%);--bg-success:hsl(86 45% 95%);
    --primary:hsl(240 91% 20%);--primary-fg:#ffffff;
    --text-warning:hsl(24 82% 40%);--bg-warning:hsl(38 90% 96%);--border-warning:hsl(38 80% 85%);
    --radius:10px;--shadow:0 1px 2px rgba(16,18,40,.04),0 1px 3px rgba(16,18,40,.06);--shadow-hover:0 6px 18px rgba(16,18,40,.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 64px}
  h1{font-weight:700;margin:0;letter-spacing:-.01em}
  .mono{font-variant-numeric:tabular-nums}
  .banner{display:flex;align-items:center;gap:8px;background:hsl(240 40% 97%);border:1px solid var(--border);border-radius:var(--radius);padding:9px 13px;color:var(--text-secondary);font-size:13px;margin-bottom:20px}
  .cf-sq{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left;width:100%;font:inherit;color:inherit;box-shadow:var(--shadow)}
  .cf-sq:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .cf-sq:disabled{cursor:default;opacity:.75;box-shadow:none;transform:none}
  .cf-sq.est{border-style:dashed;border-color:var(--border-strong)}
  .cf-amt{font-weight:700;letter-spacing:-.01em}
  .cf-btn{background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:8px;padding:8px 16px;cursor:pointer;font:inherit;font-size:14px;font-weight:600}
  .cf-btn:hover{filter:brightness(1.18)}
  .cf-btn.sm{padding:5px 11px;font-size:13px}
  .cf-pill{border:1px solid var(--border-strong);background:var(--surface-2);border-radius:99px;padding:6px 14px;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--text-secondary)}
  .cf-pill:hover{border-color:var(--text-muted)}
  .cf-pill[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:6px 4px}
  .ghost:hover{color:var(--text-primary)}
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.est{border-style:dashed;border-color:var(--border-strong)}
  .seg{display:inline-flex;background:hsl(240 20% 96%);border:1px solid var(--border);border-radius:99px;padding:3px}
  .seg button{border:none;background:none;border-radius:99px;padding:5px 14px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary)}
  .seg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg)}
  .payseg{display:flex;gap:6px}
  .payseg button{flex:1;border:1px solid var(--border-strong);background:var(--surface-2);border-radius:10px;padding:9px 6px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.2}
  .payseg button:hover{border-color:var(--text-muted)}
  .payseg button[aria-pressed="true"]{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
  .chip{background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .chip .k{font-size:12px;color:var(--text-muted)}
  .chip .v{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .measured{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-success);background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:99px;padding:3px 9px}
  .esttag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text-warning)}
  .fid-banner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px;color:var(--text-warning);background:var(--bg-warning);border:1px solid var(--border-warning);border-radius:10px;padding:9px 12px;margin-bottom:14px}
  .disc{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
  .disc-toggle{background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;padding:2px 0}
  .disc-body{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .disc-msg{max-width:85%;background:hsl(240 20% 97%);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
  .disc-msg.me{align-self:flex-end;background:hsl(240 60% 97%);border-color:hsl(240 40% 90%)}
  .disc-name{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
  .disc-text{font-size:13px}
  .disc-att{margin-top:6px;display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:4px 8px}
  .disc-reply{display:flex;gap:6px;margin-top:2px}
  .disc-reply input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:var(--surface-1)}
  .cf-fade{animation:cfOut .35s forwards}
  @keyframes cfOut{to{opacity:0;transform:scale(.96);height:0;margin:0;padding:0;border-width:0}}

  /* ===== Planner shell (appended) ===== */
  .pl-sticky{position:sticky;top:0;z-index:20;background:var(--surface-0);padding:14px 0 12px;margin:-2px 0 18px;border-bottom:1px solid var(--border)}
  .pl-sumcard{background:var(--surface-2);border:1px solid var(--border-strong);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .pl-sumtop{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .pl-sumlead{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .pl-hero{font-size:32px;line-height:1.05;letter-spacing:-.02em;color:var(--text-success)}
  .pl-count{font-size:13px;color:var(--text-secondary)}
  .pl-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pl-metric{background:hsl(240 20% 98%);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
  .pl-metric .k{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .pl-metric .v{font-size:18px;font-weight:700;letter-spacing:-.01em;margin-top:1px}
  .pl-row{display:flex;align-items:center;gap:13px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);transition:border-color .12s,box-shadow .12s,opacity .12s}
  .pl-row:hover{border-color:var(--border-strong)}
  .pl-row.off{opacity:.5}
  .pl-row.dash{border-style:dashed;border-color:var(--border-strong)}
  .pl-row.noselect{background:hsl(240 20% 98.5%)}
  .pl-lock{flex-shrink:0;width:44px;height:26px;display:inline-flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:15px}
  .pl-fig.est-fig .big{color:var(--text-secondary)}
  .pl-fig.est-fig .cf-btn.sm{white-space:nowrap}
  .pl-tog{flex-shrink:0;width:44px;height:26px;border-radius:99px;border:1px solid var(--border-strong);background:hsl(240 14% 92%);position:relative;cursor:pointer;padding:0;transition:background .14s,border-color .14s}
  .pl-tog::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(16,18,40,.25);transition:left .14s}
  .pl-tog[aria-pressed="true"]{background:var(--primary);border-color:var(--primary)}
  .pl-tog[aria-pressed="true"]::after{left:20px}
  .pl-tog:disabled{cursor:default;opacity:.55}
  .pl-name{min-width:0;flex:1}
  .pl-nm-btn{background:none;border:none;padding:0;margin:0;font:inherit;color:inherit;cursor:pointer;text-align:left;font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .pl-nm-btn:hover{color:var(--primary);text-decoration:underline}
  .pl-nm-btn .ti-chevron-right{font-size:14px;color:var(--text-muted)}
  .pl-sub{font-size:12.5px;color:var(--text-muted);margin-top:2px}
  .pl-fig{text-align:right;flex-shrink:0}
  .pl-fig .big{font-size:18px;font-weight:700;letter-spacing:-.01em;color:var(--text-success)}
  .pl-fig.off-fig .big{color:var(--text-muted)}
  .pl-fig .small{font-size:12px;color:var(--text-secondary);margin-top:1px}
  .pl-need{font-size:12px;color:var(--text-warning);font-weight:500;display:inline-flex;align-items:center;gap:4px}
  .pl-sectlabel{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin:20px 2px 9px}
  .pl-quickrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .pl-cta{display:inline-flex;align-items:center;gap:7px;background:var(--primary);color:var(--primary-fg);border:1px solid var(--primary);border-radius:10px;padding:11px 18px;cursor:pointer;font:inherit;font-size:15px;font-weight:600}
  .pl-cta:hover{filter:brightness(1.18)}
  .pl-cta:disabled{opacity:.55;cursor:default;filter:none}
  .pl-hero-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .pl-signline{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;font:inherit;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:12px;padding:13px 15px;box-shadow:var(--shadow);cursor:pointer;color:var(--text-primary);margin-top:14px}
  .pl-signline:hover{border-color:var(--text-muted)}
  .pl-signline .amt{color:var(--text-success);font-weight:700}
  .pl-savedcard{display:block;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 15px 9px;box-shadow:var(--shadow);margin-top:10px;transition:box-shadow .12s,border-color .12s}
  .pl-savedcard:hover{box-shadow:var(--shadow-hover);border-color:var(--border-strong)}
  .pl-savedtop{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:7px}
  .pl-savedtop .v{font-weight:700;color:var(--text-success);letter-spacing:-.01em;font-size:16px}
  .pl-savedtop .k{font-size:12.5px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .sav-legend{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:12px;color:var(--text-secondary);margin-top:8px}
  .sav-legend span{display:inline-flex;align-items:center;gap:5px}
  .sav-legend i.k{width:16px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}
  .approved-strip{display:flex;align-items:center;gap:8px;background:var(--bg-success);border:1px solid hsl(86 40% 82%);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text-success)}
  .approved-strip b{font-weight:700}
  @media (max-width:560px){
    .pl-metrics{grid-template-columns:1fr}
    .pl-hero-row{align-items:stretch}
    .pl-hero-row .pl-cta{width:100%;justify-content:center}
    .pl-row{flex-wrap:wrap}
    .pl-fig{text-align:left;width:100%;padding-left:57px}
  }
</style>
</head>
<body>

</div>
<script>
(function(){
  var app=document.getElementById('app');
  var DATA={
    portfolio:"Coastline Hospitality Group",
    prospects:[
      {id:'p1',name:'Summit Ridge Suites',cf:225000,ready:true,step:'Proposal ready'},
      {id:'p2',name:'Harbor Point Hotel',cf:195000,ready:true,step:'Proposal ready'},
      {id:'p3',name:'Grandview Hotel',cf:175000,ready:false,step:'Complete your audit',est:true},
      {id:'p4',name:'Old Town Motel',cf:150000,ready:false,step:'Complete your audit',est:true},
      {id:'p5',name:'Pinewood Inn',cf:130000,ready:false,step:'Add your utility bills',est:true},
      {id:'p6',name:'Bayside Motor Lodge',cf:95000,ready:false,step:'Add your utility bills',est:true}
    ],
    solutions:[
      {id:'s1',prop:'Marina Bay Inn',type:'Solar + Batteries',u:0,note:'Start now — about a year to build for the 2027 rebate',vendor:'GreenVolt Partners',install:'about 6 weeks · starts Sep',fidelity:'measured',market:430000,discountPct:12,incentive:130000,savings:75000,loan:{termYears:25,aprPct:6.5},lease:{annualAtrium:44000,annualMarket:52000,termYears:20}},
      {id:'s5',prop:'Cedar Court Hotel',type:'Solar + Batteries',u:0,note:'Start now — about a year to build for the 2027 rebate',vendor:'GreenVolt Partners',install:'about 5 weeks',fidelity:'measured',market:300000,discountPct:12,incentive:90000,savings:53000,loan:{termYears:25,aprPct:6.5},lease:{annualAtrium:31000,annualMarket:37000,termYears:20}},
      {id:'s2',prop:'Marina Bay Inn',type:'Heat Pump Water Heaters',u:1,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'measured',market:72000,discountPct:12,incentive:15000,savings:17000,loan:{termYears:5,aprPct:6.9},lease:null},
      {id:'s6',prop:'Cedar Court Hotel',type:'LED Lighting',u:0,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',market:46000,discountPct:13,incentive:6000,savings:13500,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s3',prop:'Marina Bay Inn',type:'LED Lighting',u:0,vendor:'BrightSwap',install:'about 2 weeks',fidelity:'measured',market:34000,discountPct:13,incentive:4000,savings:10000,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s4',prop:'Marina Bay Inn',type:'Smart Thermostats',u:2,vendor:'Cozy Controls',install:'about 1 week',fidelity:'measured',market:10000,discountPct:14,incentive:1500,savings:4500,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s10',prop:'Marina Bay Inn',type:'Building Controls (EMS)',u:1,vendor:'Nodal Systems',install:'about 3 weeks',fidelity:'measured',market:60000,discountPct:12,incentive:9000,savings:22000,loan:{termYears:5,aprPct:6.9},lease:null},
      {id:'s11',prop:'Cedar Court Hotel',type:'Kitchen Hood Controls',u:1,vendor:'AirWise Controls',install:'about 1 week',fidelity:'measured',market:28000,discountPct:12,incentive:3000,savings:9000,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s12',prop:'Cedar Court Hotel',type:'Pool Heat Pump',u:2,vendor:'ThermaPool',install:'about 2 weeks',fidelity:'measured',market:38000,discountPct:12,incentive:5000,savings:11000,loan:{termYears:5,aprPct:6.9},lease:null},
      {id:'s13',prop:'Riverside Lodge',type:'Low-Flow Water Fixtures',u:0,vendor:'AquaTrim',install:'about 1 week',fidelity:'measured',market:14000,discountPct:13,incentive:2000,savings:6500,loan:{termYears:5,aprPct:7.9},lease:null},
      {id:'s8',prop:'Riverside Lodge',type:'Heat Pump Water Heaters',u:0,vendor:'Thermal Systems',install:'about 2 weeks',fidelity:'estimated',dataNeed:'your water-heater metering',savings:12000},
      {id:'s9',prop:'Riverside Lodge',type:'Smart Thermostats',u:1,vendor:'Cozy Controls',install:'about 1 week',fidelity:'estimated',dataNeed:'occupancy data',savings:12500},
      {id:'s7',prop:'Cedar Court Hotel',type:'Ozone Laundry',u:0,vendor:'PureWash',install:'about 1 week',fidelity:'measured',market:24000,discountPct:12,incentive:2500,savings:10000,loan:{termYears:5,aprPct:7.9},lease:null}
    ],
    // properties Atrium already operates — these have savings history + a forecast
    contracted:[
      {id:'c1',name:'Marina Bay Inn',rooms:120,saved:174000,runPct:96,next12:392000,without12:470000,perRoomNight:12.10},
      {id:'c2',name:'Cedar Court Hotel',rooms:150,saved:146000,runPct:94,next12:471000,without12:560000,perRoomNight:11.40},
      {id:'c3',name:'Riverside Lodge',rooms:96,saved:92000,runPct:108,next12:318000,without12:372000,perRoomNight:13.60}
    ],
    savedByType:[
      {type:'Solar + Batteries',saved:198000,pace:205000},
      {type:'LED Lighting',saved:96000,pace:92000},
      {type:'Heat Pump Water Heaters',saved:71000,pace:66000},
      {type:'Smart Thermostats',saved:47000,pace:44000}
    ]
  };
  var S={screen:'home',bucket:2,solView:'type',group:null,leafId:null,savView:'property',savLeaf:null,period:'annual',signed:{},approved:{},approvedMode:{},mode:{},disc:{},unlocked:0};
  var UL=['Now','Soon','Later'];
  function fmtK(n){n=Math.round(n);var s=n<0?'-':'';n=Math.abs(n);if(n>=1e6)return s+'$'+(n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(n>=1e3)return s+'$'+Math.round(n/1e3)+'K';return s+'$'+n;}
  function fmt(n){return '$'+Math.round(n).toLocaleString();}
  function fmtRange(lo,hi){return fmtK(lo)+'–'+fmtK(hi);}
  function cap(s){return s[0].toUpperCase()+s.slice(1);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pmtMo(P,aprPct,termY){var r=aprPct/100/12,n=termY*12;return P*r/(1-Math.pow(1+r,-n));}
  function est(s){return s.fidelity==='estimated';}
  function price(s){return Math.round(s.market*(1-s.discountPct/100));}
  function net(s){return price(s)-s.incentive;}
  function payback(s){return net(s)/s.savings;}
  function fiveCash(s){return 5*s.savings-net(s);}
  function savLo(s){return Math.round(s.savings*0.75/1000)*1000;}
  function savHi(s){return Math.round(s.savings*1.25/1000)*1000;}
  function tileVal(s){return est(s)?5*s.savings:fiveCash(s);}
  function solModes(s){var m=['cash'];if(s.loan)m.push('loan');if(s.lease)m.push('lease');return m;}
  function curMode(s){var ms=solModes(s);var d=s.loan?'loan':(s.lease?'lease':'cash');var m=S.mode[s.id]||d;return ms.indexOf(m)>=0?m:d;}
  function per(x){return S.period==='monthly'?fmt(x/12)+'/mo':fmt(x)+'/yr';}
  function amtUnit(annual){ return S.period==='monthly' ? {a:fmtK(annual/12),u:'a month'} : {a:fmtK(annual),u:'a year'}; }
  function perTile(annual){var v=S.period==='monthly'?annual/12:annual;return fmtK(v)+'<span style="font-size:.6em;color:var(--text-muted);font-weight:600"> '+(S.period==='monthly'?'/mo':'/yr')+'</span>';}
  function perRange(lo,hi){return S.period==='monthly'?fmt(Math.round(lo/12))+'–'+fmt(Math.round(hi/12))+'/mo':fmtK(lo)+'–'+fmtK(hi)+'/yr';}
  function prospects(){return DATA.prospects.filter(function(p){return !S.signed[p.id];});}
  function sols(){return DATA.solutions.filter(function(s){return !S.approved[s.id];});}
  function sumCf(a){return a.reduce(function(t,x){return t+x.cf;},0);}
  function sumTile(a){return a.reduce(function(t,x){return t+tileVal(x);},0);}
  function sumSav(a){return a.reduce(function(t,x){return t+x.savings;},0);}
  function distinctProps(a){var o={};a.forEach(function(s){o[s.prop]=1;});return Object.keys(o).length;}
  function approveAnnualFor(name){return sols().filter(function(s){return s.prop===name;}).reduce(function(t,s){return t+s.savings;},0);}
  function approveCountFor(name){return sols().filter(function(s){return s.prop===name;}).length;}
  // Atrium-recommended priority: incentive deadlines first, then quick wins (fast payback / low friction), then value.
  // Rationale: land early wins so customers feel good about Atrium while larger cash flow keeps unlocking over the contract.
  function atriumScore(s){
    // Quick wins lead (fast payback = earliest banked win). Deadline projects (e.g. solar's 2027 clock)
    // get a modest bump so the clock starts, but a true quick win still goes first.
    var pay=est(s)?8:payback(s);
    return pay - (s.note?1.3:0);
  }
  function recSort(a,b){ return atriumScore(a)-atriumScore(b); }
  function econ(s,mode){
    var sav=s.savings,nt=net(s),pay=payback(s);
    if(mode==='cash'){
      return {hero:'+'+per(sav), sub:'One-time '+fmt(nt)+' upfront, then it’s yours',
        chips:[['Upfront (one-time)',fmt(nt)],['Payback',pay.toFixed(1)+' yrs']],
        series:(function(){var a=[];for(var y=0;y<=10;y++)a.push(-nt+y*sav);return a;})(), be:pay, beLabel:'breaks even at '+pay.toFixed(1)+' yrs',
        takeaway:'Pay '+fmt(nt)+' once, then keep '+per(sav)+' — best lifetime return.'};
    }
    if(mode==='loan'){
      var m=pmtMo(nt,s.loan.aprPct,s.loan.termYears),ann=m*12,t=s.loan.termYears;

  function savHeroSvg(){
    var saved=DATA.contracted.reduce(function(t,c){return t+c.saved;},0);

    var w=300,h=46,padX=1,padT=5,padB=3,past=18,n=past+10,mPast=saved/past,mFut=pace/12,cum=0,s=[];
    for(var i=0;i<=n;i++){s.push(cum);var seas=1+0.4*Math.sin(i/12*2*Math.PI-Math.PI/2);cum+=(i<past?mPast:mFut)*seas;}

    var area=poly(0,n)+' '+X(n).toFixed(1)+','+Y(0).toFixed(1)+' '+X(0).toFixed(1)+','+Y(0).toFixed(1);
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'

  function trajChart(sc,apprAnn){
    var wom=sc.without12/12, savFrac=(sc.without12-sc.next12)/sc.without12, apprFrac=Math.min(0.42,savFrac+(apprAnn||0)/sc.without12);
    var n=25,w=340,h=120,padX=6,padT=10,padB=8,today=12,s=[];
    // deterministic, irregular month-to-month variation (sum of sines) — no mythical steady state
    function noise(i){return 0.055*Math.sin(i*0.9+0.5)+0.03*Math.sin(i*2.15+1.7)+0.018*Math.sin(i*4.3+3.1);}
    for(var i=0;i<n;i++){
      var without=wom*(1+noise(i));
      var g=Math.min(1,i/today); // realized savings ramp in over the trailing year — 0 savings twelve months ago
      var wth=without*(1-savFrac*g*(1+0.18*Math.sin(i*1.3+0.9)));
      var target=without*(1-apprFrac*(1+0.18*Math.sin(i*1.3+0.9)));
      var appr=i<=today?wth:wth+(target-wth)*Math.min(1,(i-today)/8); // approved work ramps in over ~8 months (time-to-value)
      s.push({without:without,wth:wth,appr:appr});
    }
    var all=[];s.forEach(function(d){all.push(d.without,d.wth);if(apprAnn)all.push(d.appr);});
    var mn=0,mx=Math.max.apply(null,all)*1.06,sp=mx-mn;
    function X(i){return padX+i/(n-1)*(w-2*padX);}
    function Y(v){return padT+(1-(v-mn)/sp)*(h-padT-padB);}
    function poly(key,from,to){var p=[];for(var i=from;i<=to;i++)p.push(X(i).toFixed(1)+','+Y(s[i][key]).toFixed(1));return p.join(' ');}
    var gap=[];for(var i=0;i<n;i++)gap.push(X(i).toFixed(1)+','+Y(s[i].without).toFixed(1));for(var j=n-1;j>=0;j--)gap.push(X(j).toFixed(1)+','+Y(s[j].wth).toFixed(1));
    return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none" style="display:block">'
      +'<polygon points="'+gap.join(' ')+'" fill="hsl(86 45% 91%)"/>'
      +'<line x1="'+X(today).toFixed(1)+'" x2="'+X(today).toFixed(1)+'" y1="'+padT+'" y2="'+(h-padB)+'" stroke="var(--border-strong)" stroke-dasharray="3 3"/>'
      +'<polyline points="'+poly('without',0,today)+'" fill="none" stroke="var(--text-warning)" stroke-width="2"/>'
      +'<polyline points="'+poly('without',today,n-1)+'" fill="none" stroke="var(--text-warning)" stroke-width="2" stroke-dasharray="5 3"/>'
      +'<polyline points="'+poly('wth',0,today)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5"/>'
      +'<polyline points="'+poly('wth',today,n-1)+'" fill="none" stroke="var(--text-success)" stroke-width="2.5" stroke-dasharray="5 3"/>'
      +(apprAnn?'<polyline points="'+poly('appr',today,n-1)+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="2 3"/>':'')
      +'</svg>';
  }

  /* ===== Planner shell logic ===== */
  // Sandbox default: every MEASURED (firm) solution starts SELECTED — this is the
  // recommended approve set. S.excl tracks any firm project the owner has toggled
  // OFF. Estimated solutions are NOT firm quotes: they can never be selected,
  // counted in the outcome, or approved — they're shown only for awareness.
  S.excl={};
  // The plan holds only solutions not yet approved (approved ones move to the
  // "Approved this session" strip). Firm = measured; estimated is awareness-only.
  function measured(){return sols().filter(function(s){return !est(s);});}
  function estimated(){return sols().filter(function(s){return est(s);});}
  // Selectable = firm only. Estimated is structurally excluded from the plan.
  function included(){return measured().filter(function(s){return !S.excl[s.id];});}
  function on(s){return !est(s)&&!S.excl[s.id];}

  // Guiding-hand outcome readout — the #1 thing on the screen. Leads with the
  // benefit NUMBER tied to a VERB ("+$173K a year with these selected"), a big
  // primary "Review & approve" CTA, and reassurance below. Only firm (measured)
  // solutions count. What-if toggles live quietly beneath.
  function summaryStrip(){
    var inc=included();
    var totalSav=inc.reduce(function(t,s){return t+s.savings;},0);
    var totalCash=inc.reduce(function(t,s){return t+tileVal(s);},0);
    var n=inc.length, nFirm=measured().length;
    var props=distinctProps(inc);
    var lead=n?'<span style="color:var(--text-success);font-weight:700">'+per(totalSav)+'</span> more with these selected'
              :'Select a project below to see your gain';
    var reassure=n?'Firm, guaranteed quotes. Savings start once you approve.'
                  :'Everything below is a firm, guaranteed quote.';
    var cta=n?'<button class="pl-cta" data-act="approve-selected"><i class="ti ti-check"></i> Review &amp; approve</button>'
             :'<button class="pl-cta" disabled><i class="ti ti-check"></i> Review &amp; approve</button>';
    var heroAmt=amtUnit(totalSav);
    return '<div class="pl-sticky"><div class="pl-sumcard">'
      +'<div class="pl-hero-row">'
        +'<div><div class="pl-sumlead">Recommended plan · ready to approve</div>'
          +'<div class="pl-hero mono">'+(n?'+':'')+heroAmt.a+' <span style="font-size:.44em;font-weight:600;color:var(--text-muted);letter-spacing:0">'+heroAmt.u+'</span></div>'
          +'<div class="pl-count">'+lead+'</div></div>'
        +cta+'</div>'
      +'<div class="pl-count" style="margin-top:8px"><i class="ti ti-shield-check" style="color:var(--text-success)"></i> '+reassure+'</div>'
      +'<div class="pl-metrics" style="margin-top:14px">'
        +'<div class="pl-metric"><div class="k">Projects selected</div><div class="v mono">'+n+' of '+nFirm+'</div></div>'
        +'<div class="pl-metric"><div class="k">Hotels</div><div class="v mono">'+props+'</div></div>'
        +'<div class="pl-metric"><div class="k">5-year cash flow</div><div class="v mono" style="color:var(--text-success)">'+fmtK(totalCash)+'</div></div></div>'
      +'<div class="pl-quickrow"><span style="font-size:12px;color:var(--text-muted);align-self:center;margin-right:2px">What if I…</span><button class="cf-pill" data-act="all"><i class="ti ti-checks"></i> Select all</button>'
        +'<button class="cf-pill" data-act="none"><i class="ti ti-square-off"></i> Clear all</button></div>'
      +'</div></div>';
  }

  function plRow(s){
    var sub=esc(s.prop)+' · '+esc(s.type);
    var name='<button class="pl-nm-btn" data-act="leaf" data-val="'+s.id+'">'+esc(s.type)+' <i class="ti ti-chevron-right"></i></button>';
    // Estimated: NOT selectable and NOT approvable — no toggle, not counted in the
    // outcome. Shown for awareness with a "Connect data" affordance to firm it up.
    if(est(s)){
      var lo=savLo(s),hi=savHi(s);
      return '<div class="pl-row dash noselect" data-row="'+s.id+'">'
        +'<span class="pl-lock" title="Not a firm quote yet — connect data to firm up"><i class="ti ti-lock"></i></span>'
        +'<div class="pl-name">'+name+'<div class="pl-sub">'+sub+'</div>'
          +'<div class="pl-need" style="margin-top:4px"><i class="ti ti-plug-connected"></i> Early estimate — connect data to firm up</div></div>'
        +'<div class="pl-fig est-fig"><div class="big mono">'+perRange(lo,hi)+'</div>'
          +'<button class="cf-btn sm" data-act="connect" data-val="'+s.id+'" style="margin-top:6px"><i class="ti ti-plug-connected"></i> Connect data</button></div>'
        +'</div>';
    }
    var included=on(s);
    return '<div class="pl-row'+(included?'':' off')+'" data-row="'+s.id+'">'
      +'<button class="pl-tog" data-act="toggle" data-val="'+s.id+'" aria-pressed="'+included+'" title="'+(included?'Selected — click to remove':'Not selected — click to add')+'"></button>'
      +'<div class="pl-name">'+name+'<div class="pl-sub">'+sub+'</div></div>'
      +'<div class="pl-fig'+(included?'':' off-fig')+'"><div class="big mono">'+per(s.savings)+'</div>'
        +'<div class="small mono">'+fmtK(fiveCash(s))+' over 5 yrs</div></div>'
      +'</div>';
  }

  // #2 sign-up: an encouraging control to add the rest of the portfolio. Green, not
  // amber — this is opportunity, not a warning. "Your other properties" because some
  // hotels are already saving with Atrium.
  function signupLine(){
    var list=prospects();
    if(!list.length)return '';
    var some=DATA.contracted.length>0;
    var amt=amtUnit(sumCf(list));
    var label=some?'Bring your other '+list.length+' properties online':'Bring your properties online';
    return '<button class="pl-signline" data-act="go" data-val="signup"><span><i class="ti ti-plus" style="color:var(--text-success)"></i> '+label+' — <span class="amt">'+amt.a+' '+amt.u+'</span> more</span><i class="ti ti-arrow-right" style="color:var(--text-muted)"></i></button>';
  }

  // #3 savings-to-date: prominent but subordinate to the hero — a compact seasonal
  // past&future chart (shared savHeroSvg) that taps into the savings drill.
  function savedLine(){
    var tot=DATA.contracted.reduce(function(t,c){return t+c.saved;},0);
    return '<button class="pl-savedcard" data-act="go" data-val="savings">'
      +'<div class="pl-savedtop"><span class="v">'+fmtK(tot)+' saved with Atrium so far</span><span class="k">past &amp; ahead <i class="ti ti-arrow-right"></i></span></div>'
      +savHeroSvg()+'</button>';
  }

  function renderPlanner(){
    var meas=measured().slice().sort(recSort);
    var ests=estimated().slice().sort(recSort);
    var head='<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:2px">'
        +'<div><p style="color:var(--text-secondary);margin:0;font-size:14px">'+esc(DATA.portfolio)+'</p>'
        +'<h1 style="margin:.2rem 0 0;font-size:26px">Plan your savings</h1></div>'
        +'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span></div>'
      +'<p style="color:var(--text-muted);margin:.3rem 0 0;font-size:13px">We’ve pre-selected your recommended set. Approve it as-is, or toggle any project to see the number move first.</p>';
    var measRows='<div class="pl-sectlabel">Selected · firm quotes ready to approve</div><div style="display:flex;flex-direction:column;gap:10px">'+meas.map(plRow).join('')+'</div>';
    var estRows=ests.length?'<div class="pl-sectlabel" style="margin-top:26px">Early estimates — connect data to firm up</div>'
        +'<p style="color:var(--text-muted);margin:0 2px 9px;font-size:12.5px">Not firm quotes yet, so they aren’t selectable or part of the total above. Connect the data and each becomes a guaranteed quote you can approve.</p>'
        +'<div style="display:flex;flex-direction:column;gap:10px">'+ests.map(plRow).join('')+'</div>':'';
    var noneFirm=meas.length?'':'<div class="pl-row"><span class="pl-lock"><i class="ti ti-circle-check" style="color:var(--text-success)"></i></span><div class="pl-name"><div style="font-weight:600;color:var(--text-success)">Every firm project is approved</div><div class="pl-sub">Connect data on the estimates below, or add more properties.</div></div></div>';
    var appd=DATA.solutions.filter(function(s){return S.approved[s.id];});
    var au=amtUnit(sumSav(appd));
    var approvedEl=appd.length?'<div class="approved-strip" style="margin-top:16px"><i class="ti ti-circle-check"></i> Approved this session — <b>'+au.a+' '+au.u+'</b> across '+appd.length+' project'+(appd.length>1?'s':'')+'</div>':'';
    app.innerHTML=head+summaryStrip()+(meas.length?measRows:noneFirm)+estRows+approvedEl+signupLine()+savedLine();
  }

  function renderLeaf(){
    var s=DATA.solutions.find(function(x){return x.id===S.leafId;});
    if(!s){S.screen='home';return renderPlanner();}
    var head='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px">'+backPill()+(est(s)?'':'<span style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text-muted)">Amounts:</span>'+perToggle()+'</span>')+'</div>';
    app.innerHTML=head+solutionCard(s);
  }

  function renderSignup(){
    var list=prospects();
    var rows=list.map(function(p){
      var cta=p.ready?'<button class="cf-btn" data-act="sign" data-val="'+p.id+'">Approve &amp; sign</button>':'<button class="cf-pill" data-act="step" data-val="'+p.id+'">'+p.step+'</button>';
      return '<div data-row="'+p.id+'" style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface-2);border:1px '+(p.est?'dashed':'solid')+' '+(p.est?'var(--border-strong)':'var(--border)')+';border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)"><div style="min-width:0"><p style="margin:0;font-weight:600">'+esc(p.name)+'</p><p style="margin:.15rem 0 0;font-size:13px;color:var(--text-muted)">'+(p.est?'Estimated · '+p.step:p.step)+'</p></div><div style="text-align:right;flex-shrink:0"><div class="cf-amt" style="font-size:19px;color:var(--text-success)">'+perTile(p.cf)+'</div><div style="margin-top:7px">'+cta+'</div></div></div>';
    }).join('');
    app.innerHTML='<div style="margin-bottom:1.25rem">'+backPill()+'<h1 style="margin:14px 0 0">Add properties to your plan</h1><p style="color:var(--text-secondary);margin:.3rem 0 0">Estimated annual savings once each property is saving with Atrium.</p></div>'+(list.length?'<div style="display:flex;flex-direction:column;gap:10px">'+rows+'</div>':'<div class="cf-sq" style="text-align:center;padding:2rem"><i class="ti ti-circle-check" style="font-size:26px;color:var(--text-success)"></i><p style="margin:.5rem 0 0">Every property is in your plan.</p></div>');
  }

  function render(){ if(S.screen==='leaf')renderLeaf(); else if(S.screen==='signup')renderSignup(); else if(S.screen==='savings')renderSavings(); else if(S.screen==='savleaf')renderSavingsLeaf(); else renderPlanner(); }

  app.addEventListener('click',function(e){
    var d=e.target.closest('[data-disc]'); if(d){S.disc[d.dataset.disc]=!S.disc[d.dataset.disc];render();return;}
    var pertog=e.target.closest('[data-period]'); if(pertog){S.period=pertog.dataset.period;render();return;}
    var seg=e.target.closest('[data-segmode]'); if(seg){S.mode[seg.dataset.sol]=seg.dataset.segmode;render();return;}
    var el=e.target.closest('[data-act],[data-approve]'); if(!el)return;
    if(el.dataset.approve){var s=DATA.solutions.find(function(x){return x.id===el.dataset.approve;});var m=curMode(s);window.open('esign.html?doc='+encodeURIComponent(s.type+' — '+s.prop),'_blank');S.approved[s.id]=1;S.approvedMode[s.id]=m;S.excl[s.id]=0;S.screen='home';render();return;}
    var a=el.dataset.act, v=el.dataset.val;
    if(a==='connect'){el.textContent='Request sent →';el.disabled=true;el.style.opacity=.7;}
    else if(a==='toggle'){var ts=DATA.solutions.find(function(x){return x.id===v;});if(ts&&!est(ts)){S.excl[v]=!S.excl[v];render();}}
    else if(a==='all'){S.excl={};render();}
    else if(a==='none'){measured().forEach(function(s){S.excl[s.id]=1;});render();}
    else if(a==='leaf'){S.leafId=v;S.screen='leaf';render();}
    else if(a==='go'){S.screen=v;render();}
    else if(a==='savview'){S.savView=v;render();}
    else if(a==='savleaf'){S.savLeaf=v;S.screen='savleaf';render();}
    else if(a==='approve-selected'){var sel=included().slice().sort(recSort)[0];if(sel){S.leafId=sel.id;S.screen='leaf';}render();}
    else if(a==='approvehere'){var mh=sols().filter(function(s){return s.prop===v;}).sort(recSort)[0];if(mh){S.leafId=mh.id;S.screen='leaf';}else S.screen='home';render();}
    else if(a==='approvetype'){var mt=sols().filter(function(s){return s.type===v;}).sort(recSort)[0];if(mt){S.leafId=mt.id;S.screen='leaf';}else S.screen='home';render();}
    else if(a==='step'){el.textContent='We’ll guide you →';el.disabled=true;el.style.opacity=.6;}
    else if(a==='sign'){var p=DATA.prospects.find(function(x){return x.id===v;});window.open('esign.html?doc='+encodeURIComponent('New property — '+p.name),'_blank');S.signed[v]=1;render();}
    else if(a==='back'){var B={leaf:'home',signup:'home',savleaf:'savings',savings:'home'};S.screen=B[S.screen]||'home';render();}
  });
  render();
})();
</script>
</body>
</html>
